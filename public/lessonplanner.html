<!DOCTYPE html>
<html lang="ar" dir="rtl"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>التخطيط الدرسي الذكي - مجمّع زايد التعليمي</title> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"> 
    <style>
        :root { --primary-slate: #0f172a; --accent-blue: #2563eb; --uae-red: #b91c1c; }
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .plan-page { width: 210mm; min-height: 297mm; padding: 12mm; margin: 20px auto; background: white; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); position: relative; }
        .section-header { background: var(--primary-slate); color: white; padding: 8px 15px; font-weight: 800; border-radius: 6px; margin: 15px 0 10px 0; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #cbd5e1; padding: 8px; font-size: 11px; text-align: right; }
        th { background: #f8fafc; font-weight: 900; }
        .tag-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; margin: 2px; border: 1px solid currentColor; }
        .tag-identity { background: #fef2f2; color: #b91c1c; }
        .tag-real-world { background: #ecfdf5; color: #059669; }
        @media print { .no-print { display: none; } .plan-page { margin: 0; box-shadow: none; border: none; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto no-print bg-white p-6 rounded-3xl shadow-lg mb-8 border border-slate-200">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-black text-slate-800">منصة التخطيط الذكي <span class="text-blue-600">v2.0</span></h1>
            <div class="flex gap-2">
                <button onclick="setLanguage('ar')" class="px-3 py-1 bg-slate-800 text-white rounded-lg text-sm">عربي</button>
                <button onclick="setLanguage('en')" class="px-3 py-1 bg-slate-200 rounded-lg text-sm">English</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="teacher-name" placeholder="اسم المعلم" class="p-3 border rounded-xl font-bold">
            <select id="subject-select" class="p-3 border rounded-xl font-bold">
                <option>اللغة العربية</option>
                <option>الرياضيات</option>
                <option>العلوم</option>
                <option>اللغة الإنجليزية</option>
            </select>
            <input type="date" id="lesson-date" class="p-3 border rounded-xl">
        </div>

        <div class="mt-4">
            <input type="text" id="ai-topic" placeholder="عنوان الدرس المعتمد..." class="w-full p-4 border-2 border-blue-50 rounded-xl mb-4 font-bold text-lg">
            <button onclick="generatePlan()" id="gen-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-blue-200">
                توليد التخطيط بمؤشرات الأداء 🚀
            </button>
        </div>

        <div id="export-actions" class="hidden mt-4 flex gap-3">
            <button onclick="exportPDF()" class="flex-1 bg-red-500 text-white py-2 rounded-lg font-bold">تصدير PDF 📄</button>
            <button onclick="window.print()" class="flex-1 bg-slate-700 text-white py-2 rounded-lg font-bold">طباعة مباشرة 🖨️</button>
        </div>
    </div>

    <div id="plan-container">
        <!-- سيتم حقن المحتوى هنا -->
    </div>

    <script>
        // دالة محاكاة التوليد (بانتظار الربط الفعلي بـ API)
        async function generatePlan() {
            const btn = document.getElementById('gen-btn');
            const topic = document.getElementById('ai-topic').value;
            const teacher = document.getElementById('teacher-name').value || "معلم المادة";
            const subject = document.getElementById('subject-select').value;
            const date = document.getElementById('lesson-date').value || new Date().toLocaleDateString();

            if(!topic) { alert("يرجى إدخال الموضوع"); return; }

            btn.disabled = true;
            btn.innerText = "جاري المعالجة الرقمية...";

            // محاكاة استجابة البيانات (JSON)
            setTimeout(() => {
                const mockData = {
                    title: topic,
                    attainment: "85% من الطلبة يحققون معايير النجاح",
                    progress: "تحسن بنسبة 20% عن التقييم القبلي",
                    activities: [
                        { type: "التمهيد (5د)", teacher: "[الهوية الوطنية] عرض فيديو عن مسبار الأمل", student: "تحليل وربط بالدرس", measure: "المؤشر: 70%، آلية القياس: مناقشة" },
                        { type: "النشاط الأساسي (20د)", teacher: "[الربط بالواقع] حل مشكلات تطبيقية", student: "عمل تعاوني", measure: "المؤشر: 85%، آلية القياس: بطاقة تقييم" }
                    ]
                };

                renderPlanHTML(mockData, teacher, subject, date);
                document.getElementById('export-actions').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "توليد التخطيط بمؤشرات الأداء 🚀";
            }, 1500);
        }

        function renderPlanHTML(data, teacher, subject, date) {
            const container = document.getElementById('plan-container');
            container.innerHTML = `
                <div class="plan-page" id="printable-area">
                    <div class="flex justify-between items-center border-b-4 border-slate-900 pb-4 mb-6">
                        <div class="text-right">
                            <h2 class="text-xl font-black">مجمّع زايد التعليمي</h2>
                            <p class="text-sm font-bold text-slate-500">الظيت الجنوبي - رأس الخيمة</p>
                        </div>
                        <div class="text-center">
                            <h1 class="text-2xl font-black text-blue-700">تخطيط درسي متكامل</h1>
                            <p class="text-[10px] text-slate-400">بناءً على معايير DSIB الإمارات</p>
                        </div>
                    </div>

                    <table>
                        <tr>
                            <th width="15%">المادة</th><td>${subject}</td>
                            <th width="15%">المعلم</th><td>${teacher}</td>
                            <th width="15%">التاريخ</th><td>${date}</td>
                        </tr>
                        <tr>
                            <th>عنوان الدرس</th><td colspan="5" class="text-red-700 font-black">${data.title}</td>
                        </tr>
                    </table>

                    <div class="section-header">مؤشرات الأداء الكمية (KPIs)</div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="p-3 bg-blue-50 border-r-4 border-blue-600">
                            <span class="block text-[10px] font-bold text-blue-800">مستهدف التحصيل (Attainment)</span>
                            <p class="font-black text-sm">${data.attainment}</p>
                        </div>
                        <div class="p-3 bg-emerald-50 border-r-4 border-emerald-600">
                            <span class="block text-[10px] font-bold text-emerald-800">مستهدف التقدم (Progress)</span>
                            <p class="font-black text-sm">${data.progress}</p>
                        </div>
                    </div>

                    <div class="section-header">خطة تنفيذ الحصة القياسية</div>
                    <table>
                        <thead>
                            <tr>
                                <th>المرحلة</th>
                                <th>دور المعلم (الروابط)</th>
                                <th>المؤشر وآلية القياس</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.activities.map(a => `
                                <tr>
                                    <td class="font-bold">${a.type}</td>
                                    <td>${a.teacher.replace('[الهوية الوطنية]', '<span class="tag-badge tag-identity">🇦🇪 الهوية الوطنية</span>')}</td>
                                    <td class="text-blue-700 font-bold">${a.measure}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    
                    <div class="mt-20 flex justify-between text-center px-10">
                        <div>
                            <p class="text-xs font-bold">توقيع المعلم</p>
                            <div class="mt-4 border-b border-black w-24 mx-auto"></div>
                        </div>
                        <div class="text-[8px] text-slate-300">نظام التخطيط الذكي 2026</div>
                        <div>
                            <p class="text-xs font-bold">اعتماد القيادة المدرسية</p>
                            <div class="mt-4 border-b border-black w-24 mx-auto"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('printable-area');
            const canvas = await html2canvas(element, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
            pdf.save("Lesson_Plan.pdf");
        }
    </script>
</body>
</html>
