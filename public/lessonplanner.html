<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>التخطيط الدرسي الذكي - مجمّع زايد التعليمي</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Word -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- Security -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --blue: #2563eb;
            --green: #10b981;
            --red: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #f1f5f9;
            margin: 0;
            padding: 20px;
        }

        [lang="en"] {
            font-family: 'Roboto', sans-serif;
            direction: ltr;
        }

        .plan-container {
            width: 210mm;
            margin: auto;
        }

        .plan-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 12mm;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 15px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th,
        td {
            border: 1px solid #cbd5e1;
            padding: 6px;
            font-size: 10px;
            vertical-align: top;
            word-wrap: break-word;
        }

        th {
            background: #f8fafc;
            font-weight: 800;
        }

        .section-header {
            background: var(--primary);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 14px;
            font-weight: 900;
            font-size: 13px;
        }

        .lo-card {
            border: 1px solid #dbeafe;
            border-right: 5px solid var(--blue);
            margin-top: 10px;
            border-radius: 6px;
            overflow: hidden;
        }

        .lo-header {
            background: #eff6ff;
            padding: 8px;
            font-weight: 900;
            color: #1d4ed8;
        }

        .criteria {
            padding: 8px;
            background: #f8fafc;
        }

        .adaptation {
            padding: 8px;
            background: #f0f7ff;
            border-top: 1px dashed #2563eb;
            color: #1e40af;
        }

        .tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 8px;
            margin: 1px;
            font-weight: 800;
        }

        .tag-blue {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .tag-red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .tag-green {
            background: #dcfce7;
            color: #15803d;
        }

        .tag-yellow {
            background: #fef3c7;
            color: #b45309;
        }

        .indicator-box {
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 10px;
            background: #f8fafc;
        }

        .indicator-title {
            font-weight: 900;
            margin-bottom: 6px;
            display: block;
        }

        .editable {
            outline: none;
            transition: 0.2s;
            border-radius: 4px;
        }

        .editable:hover {
            background: #f1f5f9;
        }

        .editable:focus {
            background: white;
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid #eee;
            border-top: 3px solid var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @media print {

            .no-print {
                display: none;
            }

            body {
                background: white;
                padding: 0;
            }

            .plan-page {
                box-shadow: none;
                margin: 0;
            }
        }
    </style>
</head>

<body>

    <div class="max-w-5xl mx-auto">

        <!-- LANGUAGE -->
        <div class="flex justify-end mb-4 no-print">

            <div class="bg-white rounded-full shadow border flex p-1">

                <button id="btn-ar"
                    class="px-4 py-1 rounded-full bg-slate-900 text-white font-bold">عربي</button>

                <button id="btn-en"
                    class="px-4 py-1 rounded-full text-slate-600 font-bold">English</button>

            </div>

        </div>

        <!-- CONTROL PANEL -->
        <div class="bg-white rounded-3xl shadow-xl p-8 mb-8 no-print">

            <div class="text-center mb-8">

                <img src="https://board-ey1r.onrender.com/icons/logo.png"
                    class="mx-auto mb-3"
                    width="90">

                <h1 class="text-3xl font-black text-slate-900">
                    منصة التخطيط الذكي
                </h1>

                <p class="text-emerald-600 font-bold mt-2">
                    مؤشرات أداء كمية وآليات قياس مباشرة
                </p>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-5">

                <div>
                    <label class="font-bold text-sm">المادة</label>

                    <select id="subject"
                        class="w-full p-3 rounded-xl border bg-slate-50">

                        <option>اللغة العربية</option>
                        <option>اللغة الإنجليزية</option>
                        <option>الرياضيات</option>
                        <option>العلوم</option>
                        <option>الفيزياء</option>
                        <option>الكيمياء</option>
                        <option>الأحياء</option>

                    </select>
                </div>

                <div>
                    <label class="font-bold text-sm">الصف</label>

                    <select id="grade"
                        class="w-full p-3 rounded-xl border bg-slate-50">

                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>

                    </select>
                </div>

                <div>
                    <label class="font-bold text-sm">المسار</label>

                    <select id="section"
                        class="w-full p-3 rounded-xl border bg-slate-50">

                        <option>العام</option>
                        <option>المتقدم</option>
                        <option>النخبة</option>

                    </select>
                </div>

                <div>
                    <label class="font-bold text-sm">فئة الاحتياجات</label>

                    <select id="sen"
                        class="w-full p-3 rounded-xl border bg-blue-50">

                        <option value="none">لا يوجد</option>
                        <option>شديدي الضعف</option>
                        <option>عسر القراءة</option>
                        <option>طيف التوحد</option>
                        <option>ADHD</option>

                    </select>
                </div>

                <div>
                    <label class="font-bold text-sm">المعلم/ة</label>

                    <input id="teacher"
                        class="w-full p-3 rounded-xl border bg-slate-50"
                        placeholder="اسم المعلم">
                </div>

            </div>

            <div class="space-y-4">

                <input id="topic"
                    class="w-full p-4 rounded-2xl border-2 border-blue-100"
                    placeholder="عنوان الدرس">

                <textarea id="outcomes"
                    rows="3"
                    class="w-full p-4 rounded-2xl border-2 border-blue-100"
                    placeholder="نواتج التعلم"></textarea>

                <button id="generate-btn"
                    class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-3">

                    <span id="btn-text">
                        توليد التخطيط 🚀
                    </span>

                    <div id="loader"
                        class="loader hidden"></div>

                </button>

            </div>

            <div id="export-box"
                class="hidden mt-5 flex gap-3">

                <button id="word-btn"
                    class="flex-1 bg-blue-700 text-white py-3 rounded-xl font-bold">

                    تصدير Word 📝

                </button>

                <button id="pdf-btn"
                    class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">

                    تصدير PDF 📄

                </button>

            </div>

        </div>

        <!-- OUTPUT -->

        <div class="plan-container">

            <div id="placeholder"
                class="bg-white p-20 rounded-3xl border-4 border-dashed text-center">

                <p class="text-slate-500 font-bold text-xl">
                    سيتم عرض التخطيط هنا
                </p>

            </div>

            <div id="plan-output"></div>

        </div>

    </div>

    <script>

        let currentLang = 'ar';
        let currentPlanData = null;

        const planOutput = document.getElementById('plan-output');

        // =========================
        // LANGUAGE
        // =========================

        document.getElementById('btn-ar').onclick = () => {
            document.documentElement.lang = 'ar';
            document.documentElement.dir = 'rtl';
            currentLang = 'ar';
        };

        document.getElementById('btn-en').onclick = () => {
            document.documentElement.lang = 'en';
            document.documentElement.dir = 'ltr';
            currentLang = 'en';
        };

        // =========================
        // HELPERS
        // =========================

        function cleanInput(value) {
            return DOMPurify.sanitize(value);
        }

        function formatTags(text = '') {

            return text
                .replace(/\[الهوية الوطنية\]/g,
                    `<span class="tag tag-red">🇦🇪 الهوية الوطنية</span>`)

                .replace(/\[الربط بالواقع\]/g,
                    `<span class="tag tag-green">🌍 الربط بالواقع</span>`)

                .replace(/\[التكامل المعرفي\]/g,
                    `<span class="tag tag-blue">🔗 التكامل المعرفي</span>`)

                .replace(/\[اختبارات IBT\]/g,
                    `<span class="tag tag-yellow">📝 اختبارات IBT</span>`);
        }

        function formatAssessment(text = '') {

            const parts = text.split('، آلية القياس:');

            if (parts.length > 1) {

                return `
                    <div><strong>${parts[0]}</strong></div>
                    <div class="mt-1 text-xs bg-slate-100 p-1 rounded">
                        🛠 ${parts[1]}
                    </div>
                `;
            }

            return text;
        }

        // =========================
        // FETCH PLAN
        // =========================

        async function fetchLessonPlan(subject, grade, topic, outcomes, sen) {

            const prompt = `
Generate UAE lesson plan JSON only.

Subject: ${subject}
Grade: ${grade}
Topic: ${topic}
SEN: ${sen}

Outcomes:
${outcomes}
`;

            const response = await fetch('/api/generate-lesson', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    prompt
                })

            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Server Error');
            }

            return data.data;
        }

        // =========================
        // RENDER PLAN
        // =========================

        function renderPlan(plan) {

            const data = plan.data;

            const template = `

<div class="plan-page">

<div class="flex justify-between items-center border-b-4 border-slate-900 pb-3 mb-4">

<div>
<img src="https://board-ey1r.onrender.com/icons/logo.png"
width="80">
</div>

<div class="text-center">
<h1 class="text-2xl font-black">
التخطيط الدرسي المتكامل
</h1>
</div>

<div class="text-xs text-slate-400 font-black">
APPROVED
</div>

</div>

<table>

<tr>
<th width="15%">المادة</th>
<td class="editable" contenteditable="true">${plan.subject}</td>

<th width="10%">الصف</th>
<td class="editable" contenteditable="true">${plan.grade}</td>
</tr>

<tr>
<th>عنوان الدرس</th>

<td colspan="3"
class="editable font-black text-red-700"
contenteditable="true">

${data.title}

</td>
</tr>

<tr>
<th>المعلم/ة</th>
<td class="editable" contenteditable="true">${plan.teacher}</td>

<th>التاريخ</th>
<td class="editable" contenteditable="true">${plan.date}</td>
</tr>

</table>

<div class="section-header">
نواتج التعلم
</div>

${data.loMapped.map(lo => `

<div class="lo-card">

<div class="lo-header editable"
contenteditable="true">

${lo.lo}

</div>

<div class="criteria editable"
contenteditable="true">

${lo.criteria.map(c => `✔ ${c}<br>`).join('')}

</div>

<div class="adaptation editable"
contenteditable="true">

♿ ${lo.adaptation}

</div>

</div>

`).join('')}

<div class="section-header">
سير الحصة
</div>

<table class="mt-3">

<thead>

<tr>

<th width="12%">المرحلة</th>
<th>دور المعلم</th>
<th>دور المتعلم</th>
<th width="20%">المؤشر</th>
<th width="10%">الزمن</th>

</tr>

</thead>

<tbody>

${data.activities.map(a => `

<tr>

<td class="editable" contenteditable="true">
${a.type}
</td>

<td class="editable" contenteditable="true">
${formatTags(a.teacher)}
</td>

<td class="editable" contenteditable="true">
${a.student}
</td>

<td class="editable" contenteditable="true">
${formatAssessment(a.assessmentForLearning)}
</td>

<td class="editable text-center"
contenteditable="true">
${a.time}
</td>

</tr>

`).join('')}

</tbody>

</table>

<div class="grid grid-cols-2 gap-3 mt-5">

<div class="indicator-box">

<span class="indicator-title">
📈 مؤشر التحصيل
</span>

<div class="editable"
contenteditable="true">

${data.attainmentIndicator}

</div>

</div>

<div class="indicator-box">

<span class="indicator-title">
🔄 مؤشر التقدم
</span>

<div class="editable"
contenteditable="true">

${data.progressIndicator}

</div>

</div>

</div>

</div>
`;

            planOutput.innerHTML = DOMPurify.sanitize(template);
        }

        // =========================
        // GENERATE
        // =========================

        document.getElementById('generate-btn')
            .addEventListener('click', async () => {

                const topic =
                    cleanInput(document.getElementById('topic').value);

                if (!topic.trim()) {
                    alert('يرجى إدخال عنوان الدرس');
                    return;
                }

                const btn = document.getElementById('generate-btn');
                const loader = document.getElementById('loader');
                const btnText = document.getElementById('btn-text');

                try {

                    btn.disabled = true;

                    loader.classList.remove('hidden');

                    btnText.textContent =
                        'جاري التوليد...';

                    const subject =
                        document.getElementById('subject').value;

                    const grade =
                        document.getElementById('grade').value;

                    const sen =
                        document.getElementById('sen').value;

                    const teacher =
                        cleanInput(document.getElementById('teacher').value);

                    const outcomes =
                        cleanInput(document.getElementById('outcomes').value);

                    const plan = await fetchLessonPlan(
                        subject,
                        grade,
                        topic,
                        outcomes,
                        sen
                    );

                    currentPlanData = {
                        ...plan,
                        subject,
                        grade,
                        teacher,
                        date: new Date().toLocaleDateString('ar-AE')
                    };

                    renderPlan(currentPlanData);

                    document.getElementById('placeholder')
                        .classList.add('hidden');

                    document.getElementById('export-box')
                        .classList.remove('hidden');

                } catch (err) {

                    console.error(err);

                    alert(err.message);

                } finally {

                    btn.disabled = false;

                    loader.classList.add('hidden');

                    btnText.textContent =
                        'توليد التخطيط 🚀';
                }

            });

        // =========================
        // WORD EXPORT
        // =========================

        document.getElementById('word-btn')
            .addEventListener('click', () => {

                const content = `
<html dir="rtl">
<head>
<meta charset="utf-8">
<style>
body{font-family:Cairo;}
table{
width:100%;
border-collapse:collapse;
}
th,td{
border:1px solid #ccc;
padding:6px;
}
</style>
</head>
<body>
${planOutput.innerHTML}
</body>
</html>
`;

                const blob = new Blob(
                    ['\ufeff', content],
                    { type: 'application/msword' }
                );

                saveAs(blob, 'lesson-plan.doc');

            });

        // =========================
        // PDF EXPORT
        // =========================

        document.getElementById('pdf-btn')
            .addEventListener('click', async () => {

                const { jsPDF } = window.jspdf;

                const pdf = new jsPDF('p', 'mm', 'a4');

                const pages =
                    document.querySelectorAll('.plan-page');

                for (let i = 0; i < pages.length; i++) {

                    const canvas = await html2canvas(pages[i], {

                        scale: 1.5,
                        useCORS: true

                    });

                    const imgData =
                        canvas.toDataURL('image/jpeg', 1);

                    const width = 210;

                    const height =
                        canvas.height * width / canvas.width;

                    if (i > 0) {
                        pdf.addPage();
                    }

                    pdf.addImage(
                        imgData,
                        'JPEG',
                        0,
                        0,
                        width,
                        height
                    );
                }

                pdf.save('lesson-plan.pdf');

            });

    </script>

</body>

</html>
