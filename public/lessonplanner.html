<script>
let currentPlanData = null;
let currentLang = 'ar';

const planOutput = document.getElementById('plan-output');
const placeholderBox = document.getElementById('placeholder-box');
const exportControls = document.getElementById('export-controls');

function escapeHtml(text = '') {
    return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function safeArray(arr) {
    return Array.isArray(arr) ? arr : [];
}

function setLanguage(lang) {
    currentLang = lang;

    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

    const btnAr = document.getElementById('btn-lang-ar');
    const btnEn = document.getElementById('btn-lang-en');

    btnAr.className = lang === 'ar'
        ? "px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white transition-colors"
        : "px-4 py-1 rounded-full text-sm font-bold text-slate-500 hover:bg-slate-100 transition-colors";

    btnEn.className = lang === 'en'
        ? "px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white transition-colors"
        : "px-4 py-1 rounded-full text-sm font-bold text-slate-500 hover:bg-slate-100 transition-colors";

    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n?.[lang]?.[key]) {
            el.textContent = i18n[lang][key];
        }
    });

    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (i18n?.[lang]?.[key]) {
            el.placeholder = i18n[lang][key];
        }
    });
}

function formatTags(text = '') {
    return String(text)
        .replace(/\[الربط بالواقع\]/g, '<span class="tag-badge tag-real-world">🌍 الربط بالواقع</span>')
        .replace(/\[الهوية الوطنية\]/g, '<span class="tag-badge tag-identity">🇦🇪 الهوية الوطنية</span>')
        .replace(/\[التكامل المعرفي\]/g, '<span class="tag-badge tag-cross-curricular">🔗 التكامل المعرفي</span>')
        .replace(/\[اختبارات IBT\]/g, '<span class="tag-badge tag-ibt">📝 اختبارات IBT</span>')
        .replace(/\[الابتكار\]/g, '<span class="tag-badge tag-innovation">💡 الابتكار</span>');
}

function formatAssessment(text = '') {
    const parts = String(text).split("، آلية القياس:");

    if (parts.length > 1) {
        return `
            <div>
                <strong>${escapeHtml(parts[0])}</strong>
            </div>
            <div class="measurement-badge">
                🛠 ${escapeHtml(parts[1])}
            </div>
        `;
    }

    return escapeHtml(text);
}

async function fetchLessonPlan(subject, grade, topic, manualOutcomes, senCategory) {

    const isEnglish = subject === "اللغة الإنجليزية";

    const promptText = `
Generate a UAE MOE COMPLIANT LESSON PLAN in Arabic.

Subject: ${subject}
Grade: ${grade}
Topic: ${topic}

Return VALID JSON ONLY.

{
  "isEnglish": ${isEnglish},
  "data": {
    "title": "${topic}",
    "strand": "المجال",
    "moeStandard": "المعيار الوزاري",
    "loMapped": [],
    "attainmentIndicator": "",
    "progressIndicator": "",
    "activities": [],
    "plenaryFlow": "",
    "diffMatrix": {
      "gifted": "",
      "high": "",
      "mid": "",
      "low": "",
      "sen": ""
    },
    "studentReflection": {
      "prompts": []
    }
  }
}
`;

    const response = await fetch('/api/generate-lesson', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            prompt: promptText,
            manualOutcomes,
            senCategory
        })
    });

    const data = await response.json();

    if (!response.ok) {
        console.error('SERVER ERROR:', data);

        throw new Error(
            data?.error?.message ||
            data?.error ||
            'Unknown server error'
        );
    }

    return data.data;
}

function renderPlan(plan) {

    if (!plan || !plan.data) {
        throw new Error('Invalid lesson plan structure');
    }

    const data = plan.data;

    data.loMapped = safeArray(data.loMapped);
    data.activities = safeArray(data.activities);

    data.studentReflection = data.studentReflection || { prompts: [] };

    data.diffMatrix = data.diffMatrix || {
        gifted: '',
        high: '',
        mid: '',
        low: '',
        sen: ''
    };

    const dir = plan.isEnglish ? 'ltr' : 'rtl';

    const template = `
    <div class="plan-page" style="direction:${dir};">

        <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3pt solid #0f172a;padding-bottom:10px;margin-bottom:15px;">

            <img 
                src="https://board-ey1r.onrender.com/icons/logo.png"
                crossorigin="anonymous"
                style="width:100px;"
            >

            <div style="text-align:center;">
                <div style="font-weight:800;font-size:14px;">
                    مجمّع زايد التعليمي الظيت الجنوبي
                </div>

                <h1 style="font-size:22px;font-weight:900;color:#0f172a;margin:5px 0;">
                    التخطيط الدرسي المتكامل (UAE DSIB)
                </h1>
            </div>

            <div class="Dr.Ali-stamp">
                APPROVED BY
            </div>
        </div>

        <table>
            <tr>
                <th width="15%">المادة</th>
                <td contenteditable="true">${escapeHtml(plan.subject)}</td>

                <th width="10%">الصف</th>
                <td contenteditable="true">${escapeHtml(plan.grade)}</td>
            </tr>

            <tr>
                <th>عنوان الدرس</th>
                <td colspan="3" contenteditable="true" style="font-weight:900;color:#b91c1c;">
                    ${escapeHtml(data.title)}
                </td>
            </tr>

            <tr>
                <th>المعلم/ة</th>
                <td contenteditable="true">${escapeHtml(plan.teacher)}</td>

                <th>التاريخ</th>
                <td contenteditable="true">${escapeHtml(plan.date)}</td>
            </tr>

            <tr style="background:#f8fafc;">
                <th>المجال</th>
                <td contenteditable="true">${escapeHtml(data.strand)}</td>

                <th>المعيار</th>
                <td contenteditable="true">${escapeHtml(data.moeStandard)}</td>
            </tr>
        </table>

        <div class="section-header">
            نواتج التعلم ومؤشرات النجاح المستهدفة
        </div>

        <div style="margin-top:8px;">

            ${data.loMapped.map(lo => `
                <div class="lo-mapping-card">

                    <div class="lo-header" contenteditable="true">
                        الناتج: ${escapeHtml(lo.lo || '')}
                    </div>

                    <div class="criteria-list" contenteditable="true">
                        ${safeArray(lo.criteria)
                            .map(c => `<div>✔ ${escapeHtml(c)}</div>`)
                            .join('')}
                    </div>

                    <div class="adaptation-box" contenteditable="true">
                        <strong>♿ مواءمة أصحاب الهمم:</strong>
                        ${escapeHtml(lo.adaptation || '')}
                    </div>

                </div>
            `).join('')}

        </div>

        <div class="section-header" style="background:#334155;">
            سير الحصة المدمج بالقياس الرقمي
        </div>

        <table style="margin-top:8px;">

            <thead>
                <tr>
                    <th width="12%">المرحلة</th>
                    <th>دور المعلم</th>
                    <th>دور المتعلم</th>
                    <th width="20%">المؤشر وآلية القياس</th>
                    <th width="10%">الأدلة</th>
                    <th width="5%">الزمن</th>
                </tr>
            </thead>

            <tbody>

                ${data.activities.map(a => `
                    <tr>

                        <td contenteditable="true">
                            ${escapeHtml(a.type || '')}
                        </td>

                        <td contenteditable="true">
                            ${formatTags(escapeHtml(a.teacher || ''))}
                        </td>

                        <td contenteditable="true">
                            ${escapeHtml(a.student || '')}
                        </td>

                        <td contenteditable="true">
                            ${formatAssessment(a.assessmentForLearning || '')}
                        </td>

                        <td contenteditable="true">
                            ${escapeHtml(a.evidence || '')}
                        </td>

                        <td contenteditable="true">
                            ${escapeHtml(a.time || '')}
                        </td>

                    </tr>
                `).join('')}

            </tbody>
        </table>

    </div>

    <div class="plan-page" style="direction:${dir};">

        <div class="section-header" style="background:#b91c1c;">
            الغلق الختامي ومصفوفة التمايز
        </div>

        <div style="border:2px solid #b91c1c;padding:10px;border-radius:0 0 10px 10px;">

            <div contenteditable="true" style="font-weight:bold;">
                ${escapeHtml(data.plenaryFlow || '')}
            </div>

            <table style="margin-top:10px;text-align:center;">

                <tr style="background:#fef2f2;font-weight:900;">
                    <td>موهوبين</td>
                    <td>متفوقين</td>
                    <td>متوسط</td>
                    <td>دعم</td>
                    <td>أصحاب همم</td>
                </tr>

                <tr>
                    <td contenteditable="true">${escapeHtml(data.diffMatrix.gifted)}</td>
                    <td contenteditable="true">${escapeHtml(data.diffMatrix.high)}</td>
                    <td contenteditable="true">${escapeHtml(data.diffMatrix.mid)}</td>
                    <td contenteditable="true">${escapeHtml(data.diffMatrix.low)}</td>
                    <td contenteditable="true">${escapeHtml(data.diffMatrix.sen)}</td>
                </tr>

            </table>

        </div>

        <div class="section-header" style="background:#475569;margin-top:20px;">
            مؤشرات الأداء النهائية
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">

            <div class="indicator-box">
                <span class="indicator-title">📈 مؤشر التحصيل</span>

                <p contenteditable="true">
                    ${escapeHtml(data.attainmentIndicator || '')}
                </p>
            </div>

            <div class="indicator-box">
                <span class="indicator-title">🔄 مؤشر التقدم</span>

                <p contenteditable="true">
                    ${escapeHtml(data.progressIndicator || '')}
                </p>
            </div>

        </div>

        <div class="student-reflection-box">

            <h3 style="font-weight:900;color:#065f46;">
                🎓 التقييم الذاتي للطلبة
            </h3>

            ${safeArray(data.studentReflection.prompts).map(p => `
                <div style="background:white;padding:5px;border-radius:5px;margin-top:5px;">
                    <strong contenteditable="true">
                        ${escapeHtml(p)}
                    </strong>

                    <div class="emoji-scale">
                        🤩 🙂 😐
                    </div>
                </div>
            `).join('')}

        </div>

    </div>
    `;

    planOutput.innerHTML = template;
}

document.addEventListener('DOMContentLoaded', () => {

    document.getElementById('btn-lang-ar')
        .addEventListener('click', () => setLanguage('ar'));

    document.getElementById('btn-lang-en')
        .addEventListener('click', () => setLanguage('en'));

    const aiGenerateBtn = document.getElementById('ai-generate-btn');
    const aiBtnText = document.getElementById('ai-btn-text');
    const aiLoader = document.getElementById('ai-loader');

    aiGenerateBtn.addEventListener('click', async () => {

        try {

            const topic = document.getElementById('ai-topic').value.trim();
            const subject = document.getElementById('subject-select').value;
            const grade = document.getElementById('grade-select').value;
            const sen = document.getElementById('sen-category').value;
            const manual = document.getElementById('manual-outcomes').value.trim();

            const teacher =
                document.getElementById('teacher-name').value.trim()
                || '..................';

            const date =
                document.getElementById('lesson-date').value
                || new Date().toLocaleDateString('ar-AE');

            if (!topic) {
                alert(
                    currentLang === 'ar'
                        ? 'يرجى إدخال عنوان الدرس'
                        : 'Please enter lesson topic'
                );
                return;
            }

            aiGenerateBtn.disabled = true;

            aiLoader.classList.remove('hidden');

            aiBtnText.textContent =
                i18n[currentLang].btnGenerating;

            const cleanTopic = topic.replace(/[<>]/g, '');
            const cleanManual = manual.replace(/[<>]/g, '');

            const plan = await fetchLessonPlan(
                subject,
                grade,
                cleanTopic,
                cleanManual,
                sen
            );

            currentPlanData = {
                ...plan,
                teacher,
                date,
                subject,
                grade
            };

            renderPlan(currentPlanData);

            placeholderBox.classList.add('hidden');
            planOutput.classList.remove('hidden');
            exportControls.classList.remove('hidden');

        } catch (error) {

            console.error(error);

            alert(
                currentLang === 'ar'
                    ? `حدث خطأ: ${error.message}`
                    : `Error: ${error.message}`
            );

        } finally {

            aiGenerateBtn.disabled = false;

            aiLoader.classList.add('hidden');

            aiBtnText.textContent =
                i18n[currentLang].btnGenerate;
        }
    });

    document.getElementById('word-download-btn')
        .addEventListener('click', () => {

            if (!planOutput.innerHTML) return;

            const title =
                document.querySelector('#cell-title')?.innerText ||
                'تخطيط';

            const htmlContent = `
                <html dir="rtl">
                    <head>
                        <meta charset="utf-8">
                        <title>${escapeHtml(title)}</title>
                    </head>
                    <body>
                        ${planOutput.innerHTML}
                    </body>
                </html>
            `;

            const blob = new Blob(
                ['\ufeff', htmlContent],
                { type: 'application/msword' }
            );

            saveAs(blob, `تخطيط_${title}.doc`);
        });

    document.getElementById('pdf-download-btn')
        .addEventListener('click', async () => {

            const { jsPDF } = window.jspdf;

            const pdf = new jsPDF('p', 'mm', 'a4');

            const pages =
                document.querySelectorAll('.plan-page');

            for (let i = 0; i < pages.length; i++) {

                const canvas = await html2canvas(pages[i], {
                    scale: 1.5,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });

                const imgData =
                    canvas.toDataURL('image/jpeg', 1.0);

                const pdfWidth = 210;

                const pdfHeight =
                    (canvas.height * pdfWidth) / canvas.width;

                if (i > 0) {
                    pdf.addPage();
                }

                pdf.addImage(
                    imgData,
                    'JPEG',
                    0,
                    0,
                    pdfWidth,
                    pdfHeight
                );
            }

            pdf.save('lesson-plan.pdf');
        });

    setLanguage('ar');
});
</script>
