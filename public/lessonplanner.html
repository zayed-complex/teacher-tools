<!DOCTYPE html>
<html lang="ar" dir="rtl"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>التخطيط الدرسي الذكي - مجمّع زايد التعليمي</title> 
<!-- Scripts & Styles --> 
<script src="https://cdn.tailwindcss.com"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script> 
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"> 
<style>
    :root { --primary-slate: #0f172a; --accent-blue: #2563eb; --success-green: #10b981; --uae-red: #b91c1c; }
    body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; }
    [contenteditable="true"] { transition: all 0.2s; outline: none; border-radius: 4px; }
    [contenteditable="true"]:hover { background-color: #f0f7ff; box-shadow: 0 0 0 2px #bfdbfe; }
    .plan-page { width: 210mm; min-height: 297mm; padding: 12mm; margin: 20px auto; background: white; border: 1px solid #e2e8f0; position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .section-header { background-color: var(--primary-slate); color: white; padding: 6px 12px; font-weight: 800; font-size: 13px; margin-top: 12px; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
    th, td { border: 0.5pt solid #cbd5e1; padding: 5px 8px; font-size: 10px; word-wrap: break-word; }
    th { background-color: #f8fafc; font-weight: 800; }
    .tag-badge { display: inline-flex; align-items: center; padding: 2px 6px; border-radius: 6px; font-size: 8px; font-weight: 800; margin: 1px; border: 1px solid currentColor; }
    .tag-real-world { background: #ecfdf5; color: #059669; }
    .tag-identity { background: #fef2f2; color: #b91c1c; }
    .measurement-badge { background: #f8fafc; border: 1px solid #cbd5e1; color: #475569; font-size: 8px; padding: 1px 4px; border-radius: 4px; display: block; margin-top: 4px; font-weight: bold; }
    @media print { .no-print { display: none; } body { padding: 0; background: white; } .plan-page { margin: 0; border: none; box-shadow: none; width: 100%; page-break-after: always; } }
</style>
</head>
<body>

<div class="max-w-5xl mx-auto">
    <!-- Language Switcher -->
    <div class="flex justify-end mb-4 no-print">
        <div class="bg-white rounded-full p-1 shadow-sm border flex items-center">
            <button onclick="setLanguage('ar')" id="btn-ar" class="px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white">عربي</button>
            <button onclick="setLanguage('en')" id="btn-en" class="px-4 py-1 rounded-full text-sm font-bold text-slate-500">English</button>
        </div>
    </div>

    <!-- Main Control Panel -->
    <div class="no-print bg-white p-8 rounded-3xl shadow-xl border border-slate-200 mb-8">
        <div class="text-center mb-8">
            <h1 id="ui-title" class="text-3xl font-black text-slate-900">منصة التخطيط الذكي - مجمّع زايد التعليمي</h1>
            <p id="ui-subtitle" class="text-emerald-600 font-bold italic">مؤشرات أداء كمية وآليات قياس مباشرة</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <select id="subject-select" class="p-3 rounded-xl border-2 bg-slate-50 font-bold">
                <option value="اللغة العربية">اللغة العربية</option>
                <option value="اللغة الإنجليزية">اللغة الإنجليزية</option>
                <option value="الرياضيات">الرياضيات</option>
                <option value="العلوم">العلوم</option>
            </select>
            <select id="grade-select" class="p-3 rounded-xl border-2 bg-slate-50 font-bold">
                <option>الصف 5</option><option>الصف 6</option><option>الصف 7</option><option>الصف 8</option>
                <option>الصف 9</option><option>الصف 10</option><option>الصف 11</option><option>الصف 12</option>
            </select>
            <input type="text" id="teacher-name" placeholder="اسم المعلم" class="p-3 rounded-xl border-2 bg-slate-50 font-bold">
            <input type="date" id="lesson-date" class="p-3 rounded-xl border-2 bg-slate-50 font-bold">
        </div>

        <div class="space-y-4">
            <input type="text" id="ai-topic" placeholder="عنوان الدرس المعتمد..." class="w-full p-5 rounded-2xl border-2 border-blue-100 font-bold text-lg shadow-sm">
            <button onclick="handleGenerate()" id="ai-generate-btn" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-3">
                <span id="btn-text">توليد التخطيط بمؤشرات التحصيل والتقدم 🚀</span>
                <div id="loader" class="hidden w-6 h-6 border-4 border-t-blue-500 border-white rounded-full animate-spin"></div>
            </button>
        </div>

        <div id="export-controls" class="mt-6 flex gap-3 hidden">
            <button onclick="exportWord()" class="flex-1 bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg">تصدير ملف Word 📝</button>
            <button onclick="exportPDF()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg">تصدير PDF 📄</button>
        </div>
    </div>

    <!-- Render Output -->
    <div id="plan-output" class="hidden"></div>
</div>

<script>
let currentLang = 'ar';

const i18n = {
    ar: { title: "منصة التخطيط الذكي - مجمّع زايد التعليمي", btn: "توليد التخطيط بمؤشرات التحصيل والتقدم 🚀", generating: "جاري المعالجة الرقمية...", teacher: "اسم المعلم" },
    en: { title: "Smart Planning Platform - Zayed Educational Complex", btn: "Generate Smart Lesson Plan 🚀", generating: "Processing Digital Indicators...", teacher: "Teacher Name" }
};

function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('ui-title').textContent = i18n[lang].title;
    document.getElementById('btn-text').textContent = i18n[lang].btn;
    document.getElementById('teacher-name').placeholder = i18n[lang].teacher;
    
    const btnAr = document.getElementById('btn-ar');
    const btnEn = document.getElementById('btn-en');
    if(lang === 'ar') {
        btnAr.className = "px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white";
        btnEn.className = "px-4 py-1 rounded-full text-sm font-bold text-slate-500";
    } else {
        btnEn.className = "px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white";
        btnAr.className = "px-4 py-1 rounded-full text-sm font-bold text-slate-500";
    }
}

// دالة المحاكاة المتقدمة (التي تعيد لك كل بياناتك الأصلية)
async function handleGenerate() {
    const topic = document.getElementById('ai-topic').value;
    if(!topic) return alert("يرجى إدخال الموضوع");

    const btnText = document.getElementById('btn-text');
    const loader = document.getElementById('loader');
    
    btnText.textContent = i18n[currentLang].generating;
    loader.classList.remove('hidden');

    // هنا يتم استدعاء الـ API الخاص بك - للتجربة سأستخدم بيانات وهمية غنية جداً
    setTimeout(() => {
        const mockData = {
            title: topic,
            strand: "التطبيقات العملية",
            moeStandard: "معيار وزارة التربية والتعليم 1.4.2",
            loMapped: [{
                lo: "أن يطبق الطالب المفاهيم الأساسية في سياقات واقعية",
                criteria: ["يحدد المشكلة بدقة", "يقترح حلولاً مبتكرة"],
                adaptation: "تبسيط المهام وتقديم نماذج بصرية"
            }],
            attainment: "85% من الطلبة يحققون الناتج بمستوى جيد فأعلى",
            progress: "زيادة 15% في دقة الإجابة مقارنة بالنشاط الاستهلالي",
            activities: [
                {type: "التمهيد (5د)", teacher: "[الهوية الوطنية] ربط الدرس برؤية الإمارات 2071", student: "عصف ذهني", measure: "المؤشر: 75%، آلية القياس: الأسئلة السابرة", evidence: "سجل الملاحظة", time: "5"},
                {type: "النشاط الأساسي (20د)", teacher: "[الربط بالواقع] حل مشكلة واقعية [الابتكار]", student: "عمل مجموعات", measure: "المؤشر: 85%، آلية القياس: تقييم الأقران", evidence: "نتاج عمل الطالب", time: "20"}
            ],
            plenary: "تلخيص شامل للنتائج المحققة",
            diff: { gifted: "مشروع بحثي", high: "حل مسائل معقدة", mid: "تطبيق مباشر", low: "دعم موجه", sen: "مهام مبسطة" }
        };

        renderFullPlan(mockData);
        document.getElementById('plan-output').classList.remove('hidden');
        document.getElementById('export-controls').classList.remove('hidden');
        loader.classList.add('hidden');
        btnText.textContent = i18n[currentLang].btn;
    }, 1500);
}

function renderFullPlan(data) {
    const teacher = document.getElementById('teacher-name').value || "..................";
    const date = document.getElementById('lesson-date').value || new Date().toLocaleDateString('ar-AE');
    const subject = document.getElementById('subject-select').value;
    const grade = document.getElementById('grade-select').value;

    const output = document.getElementById('plan-output');
    output.innerHTML = `
        <div class="plan-page" id="page-1">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3pt solid #0f172a; padding-bottom:10px;">
                <h1 style="font-size:18px; font-weight:900;">مجمّع زايد التعليمي - الظيت الجنوبي</h1>
                <div style="text-align:center">
                    <div style="font-weight:900">التخطيط الدرسي المتكامل</div>
                    <div style="font-size:10px">UAE DSIB STANDARDS</div>
                </div>
            </div>

            <table style="margin-top:15px">
                <tr><th>المادة</th><td>${subject}</td><th>الصف</th><td>${grade}</td></tr>
                <tr><th>عنوان الدرس</th><td colspan="3" style="color:red; font-weight:900">${data.title}</td></tr>
                <tr><th>المعلم/ة</th><td>${teacher}</td><th>التاريخ</th><td>${date}</td></tr>
            </table>

            <div class="section-header">نواتج التعلم ومواءمة أصحاب الهمم</div>
            ${data.loMapped.map(lo => `
                <div style="border:1px solid #e2e8f0; margin-top:5px; padding:8px; border-right:4px solid blue">
                    <div style="font-weight:900; color:#1e40af">الناتج: ${lo.lo}</div>
                    <div style="font-size:9px; color:#059669">المعايير: ${lo.criteria.join(' - ')}</div>
                    <div style="font-size:9px; background:#f0f7ff; padding:4px; margin-top:4px">♿ دعم الهمم: ${lo.adaptation}</div>
                </div>
            `).join('')}

            <div class="section-header">سير الحصة (القياس الرقمي المباشر)</div>
            <table>
                <thead>
                    <tr><th>المرحلة</th><th>دور المعلم</th><th>المؤشر والقياس</th><th>الزمن</th></tr>
                </thead>
                <tbody>
                    ${data.activities.map(a => `
                        <tr>
                            <td style="font-weight:bold">${a.type}</td>
                            <td>${formatTags(a.teacher)}</td>
                            <td style="color:#1e40af">${formatAssessment(a.measure)}</td>
                            <td>${a.time} د</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>

            <div class="section-header" style="background:#b91c1c">مصفوفة التمايز (Differentiation)</div>
            <table style="text-align:center">
                <tr style="background:#fef2f2"><td>موهوبين</td><td>متفوقين</td><td>متوسط</td><td>دعم</td><td>أصحاب همم</td></tr>
                <tr>
                    <td>${data.diff.gifted}</td><td>${data.diff.high}</td>
                    <td>${data.diff.mid}</td><td>${data.diff.low}</td><td>${data.diff.sen}</td>
                </tr>
            </table>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px">
                <div style="border:1px solid #ddd; padding:10px; border-right:4px solid red">
                    <div style="font-weight:900; font-size:10px">📈 مؤشر التحصيل</div>
                    <div style="font-size:11px; font-weight:bold">${data.attainment}</div>
                </div>
                <div style="border:1px solid #ddd; padding:10px; border-right:4px solid blue">
                    <div style="font-weight:900; font-size:10px">🔄 مؤشر التقدم</div>
                    <div style="font-size:11px; font-weight:bold">${data.progress}</div>
                </div>
            </div>
            
            <div style="margin-top:auto; text-align:center; font-size:8px; color:#999">طُبع بواسطة منصة التخطيط الذكي - مجمّع زايد 2026</div>
        </div>
    `;
}

function formatTags(text) {
    return text.replace(/\[الهوية الوطنية\]/g, '<span class="tag-badge tag-identity">🇦🇪 الهوية الوطنية</span>')
               .replace(/\[الربط بالواقع\]/g, '<span class="tag-badge tag-real-world">🌍 الربط بالواقع</span>')
               .replace(/\[الابتكار\]/g, '<span class="tag-badge tag-innovation">💡 الابتكار</span>');
}

function formatAssessment(text) {
    const parts = text.split("، آلية القياس:");
    if(parts.length > 1) {
        return `<strong>${parts[0]}</strong><div class="measurement-badge">🛠 ${parts[1]}</div>`;
    }
    return text;
}

// دالة تصدير ملف Word
function exportWord() {
    const content = document.getElementById('plan-output').innerHTML;
    const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
    saveAs(blob, 'Lesson_Plan.doc');
}

// دالة تصدير PDF
async function exportPDF() {
    const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
    const canvas = await html2canvas(document.getElementById('page-1'), { scale: 2 });
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
    pdf.save("Lesson_Plan.pdf");
}
</script>
</body>
</html>
