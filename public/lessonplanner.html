<!DOCTYPE html>
<html lang="ar" dir="rtl"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>التخطيط الدرسي الذكي - مجمّع زايد التعليمي</title> 
<script src="https://cdn.tailwindcss.com"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script> 
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"> 
<style>
    :root { --primary-slate: #0f172a; --accent-blue: #2563eb; --success-green: #10b981; --uae-red: #b91c1c; }
    body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; padding: 20px; }
    
    /* تنسيق الورقة المطابق للملف المرفق */
    .plan-page { 
        width: 210mm; min-height: 297mm; padding: 12mm; 
        margin: 20px auto; background: white; border: 1px solid #e2e8f0; 
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); position: relative;
    }
    
    .section-header { 
        background-color: var(--primary-slate); color: white; 
        padding: 6px 12px; font-weight: 800; font-size: 13px; 
        margin-top: 15px; border-radius: 4px; display: flex; justify-content: space-between;
    }

    table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
    th, td { border: 0.5pt solid #cbd5e1; padding: 6px 8px; font-size: 10px; vertical-align: top; }
    th { background-color: #f8fafc; font-weight: 800; text-align: right; color: #1e293b; }

    .lo-mapping-card { border: 1pt solid #e2e8f0; border-right: 5px solid var(--accent-blue); margin-bottom: 8px; background: #f8fafc; border-radius: 4px; }
    .lo-header { background: #eff6ff; padding: 5px 10px; font-weight: 900; font-size: 11px; color: #1e40af; border-bottom: 1px solid #dbeafe; }
    
    .tag-badge { display: inline-flex; align-items: center; padding: 2px 6px; border-radius: 6px; font-size: 8px; font-weight: 800; margin: 1px; border: 1px solid currentColor; }
    .tag-real-world { background: #ecfdf5; color: #059669; }
    .tag-identity { background: #fef2f2; color: #b91c1c; }
    .tag-innovation { background: #eff6ff; color: #2563eb; }

    .indicator-box { border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; background: #f8fafc; border-right: 4px solid var(--accent-blue); }
    .measurement-badge { background: #f1f5f9; border: 1px solid #cbd5e1; font-size: 9px; padding: 2px 5px; border-radius: 4px; display: block; margin-top: 5px; font-weight: bold; color: #1e40af; }

    .student-reflection-box { border: 2pt solid var(--success-green); background: #f0fdf4; padding: 10px; border-radius: 10px; margin-top: 10px; }

    @media print { .no-print { display: none; } .plan-page { box-shadow: none; border: none; margin: 0; width: 100%; page-break-after: always; } }
</style>
</head>
<body>

    <div class="max-w-5xl mx-auto no-print bg-white p-8 rounded-3xl shadow-xl border mb-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black">منصة التخطيط الذكي - مجمّع زايد</h1>
            <div class="flex gap-2">
                <button onclick="setLang('ar')" class="px-4 py-1 bg-slate-900 text-white rounded-full text-sm font-bold">عربي</button>
                <button onclick="setLang('en')" class="px-4 py-1 bg-slate-200 rounded-full text-sm font-bold">EN</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <input type="text" id="teacher-name" placeholder="اسم المعلم" class="p-3 border-2 rounded-xl font-bold">
            <input type="text" id="ai-topic" placeholder="عنوان الدرس..." class="p-3 border-2 rounded-xl font-bold">
            <input type="date" id="lesson-date" class="p-3 border-2 rounded-xl">
        </div>

        <button onclick="generatePlan()" id="btn-gen" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">
            توليد التخطيط بمؤشرات التحصيل والتقدم 🚀
        </button>

        <div id="export-btns" class="hidden mt-4 flex gap-4">
            <button onclick="exportWord()" class="flex-1 bg-blue-800 text-white py-3 rounded-xl font-bold">تصدير Word 📝</button>
            <button onclick="exportPDF()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">تصدير PDF 📄</button>
        </div>
    </div>

    <div id="plan-output"></div>

    <script>
        function generatePlan() {
            const topic = document.getElementById('ai-topic').value;
            const teacher = document.getElementById('teacher-name').value || "..................";
            const date = document.getElementById('lesson-date').value || new Date().toLocaleDateString('ar-AE');
            
            document.getElementById('export-btns').classList.remove('hidden');
            
            const output = document.getElementById('plan-output');
            output.innerHTML = `
                <div class="plan-page" id="main-plan">
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:3pt solid #0f172a; padding-bottom:10px; margin-bottom:15px;">
                        <div style="font-weight:900; font-size:12px;">مجمّع زايد التعليمي - الظيت الجنوبي</div>
                        <div style="text-align:center">
                            <h1 style="font-size:20px; font-weight:900; color:#0f172a; margin:0;">التخطيط الدرسي المتكامل</h1>
                            <span style="font-size:9px; color:#64748b; font-weight:bold;">COMPLIANT WITH UAE DSIB STANDARDS</span>
                        </div>
                        <div style="border:1px solid #ddd; padding:5px; font-size:8px; text-align:center;">APPROVED BY<br>MANAGEMENT</div>
                    </div>

                    <table>
                        <tr>
                            <th width="15%">المادة</th><td>اللغة العربية</td>
                            <th width="15%">الصف</th><td>الصف التاسع - عام</td>
                        </tr>
                        <tr>
                            <th>عنوان الدرس</th><td colspan="3" style="color:#b91c1c; font-weight:900; font-size:14px;">${topic}</td>
                        </tr>
                        <tr>
                            <th>المعلم/ة</th><td>${teacher}</td>
                            <th>التاريخ</th><td>${date}</td>
                        </tr>
                    </table>

                    <div class="section-header">نواتج التعلم ومؤشرات النجاح المستهدفة</div>
                    <div class="lo-mapping-card">
                        <div class="lo-header">الناتج التعليمي المستهدف (LO)</div>
                        <div style="padding:8px; font-size:10px;">
                            ✔ أن يحلل الطالب النص الأدبي مستخرجاً الصور الجمالية بدقة 85%.<br>
                            ✔ أن يربط بين معاني النص والواقع المجتمعي.
                        </div>
                        <div style="background:#f0f7ff; padding:6px; border-top:1px dashed #bfdbfe; font-size:9px; color:#1e40af;">
                            <strong>♿ مواءمة أصحاب الهمم:</strong> استخدام خرائط ذهنية مكبرة وتبسيط المهام الكتابية.
                        </div>
                    </div>

                    <div class="section-header" style="background:#334155;">سير الحصة المدمج بالقياس الرقمي (DSIB Measured)</div>
                    <table>
                        <thead>
                            <tr style="background:#f8fafc;">
                                <th width="15%">المرحلة</th>
                                <th>دور المعلم (الروابط)</th>
                                <th width="25%">المؤشر وآلية القياس</th>
                                <th width="5%">زمن</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td style="font-weight:bold; text-align:center;">التمهيد</td>
                                <td><span class="tag-badge tag-identity">🇦🇪 الهوية الوطنية</span> ربط موضوع الدرس بقيم المجتمع الإماراتي.</td>
                                <td style="color:#1e40af;">
                                    <strong>المؤشر: تحصيل 75%</strong>
                                    <div class="measurement-badge">🛠 آلية القياس: الأسئلة السابرة</div>
                                </td>
                                <td style="text-align:center;">5د</td>
                            </tr>
                            <tr>
                                <td style="font-weight:bold; text-align:center;">النشاط الأساسي</td>
                                <td><span class="tag-badge tag-real-world">🌍 الربط بالواقع</span> تطبيق المهارة على مواقف حياتية.</td>
                                <td style="color:#1e40af;">
                                    <strong>المؤشر: تحصيل 85%</strong>
                                    <div class="measurement-badge">🛠 آلية القياس: تقييم الأقران</div>
                                </td>
                                <td style="text-align:center;">20د</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="section-header" style="background:#b91c1c;">مصفوفة التمايز الختامية (Differentiation Matrix)</div>
                    <table style="text-align:center;">
                        <tr style="background:#fef2f2; font-weight:900;">
                            <td>موهوبين</td><td>متفوقين</td><td>متوسط</td><td>دعم</td><td>أصحاب همم</td>
                        </tr>
                        <tr>
                            <td>تحليل نقدي</td><td>استنتاج متقدم</td><td>تطبيق مباشر</td><td>مهام موجهة</td><td>نماذج بصرية</td>
                        </tr>
                    </table>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                        <div class="indicator-box">
                            <span style="font-weight:900; color:#b91c1c; font-size:10px;">📈 مؤشر التحصيل (Attainment)</span>
                            <p style="font-weight:bold; font-size:11px;">80% يحققون الناتج بمستوى جيد فأعلى</p>
                        </div>
                        <div class="indicator-box">
                            <span style="font-weight:900; color:#2563eb; font-size:10px;">🔄 مؤشر التقدم (Progress)</span>
                            <p style="font-weight:bold; font-size:11px;">زيادة 15% مقارنة بالنشاط الاستهلالي</p>
                        </div>
                    </div>

                    <div class="student-reflection-box">
                        <h3 style="font-weight:900; color:#065f46; font-size:11px; margin-bottom:5px;">🎓 التقييم الذاتي للطلبة (Reflection)</h3>
                        <div style="display:flex; justify-content:space-between; font-size:10px;">
                            <div>ماذا تعلمت اليوم؟ <span style="font-size:14px;">🤩 🙂 😐</span></div>
                            <div style="border-bottom:1px dotted #aaa; width:50%;"></div>
                        </div>
                    </div>

                    <div style="margin-top:auto; padding-top:20px; display:flex; justify-content:space-between; align-items:flex-end;">
                        <div style="text-align:center;">
                            <div style="font-size:10px; font-weight:bold;">توقيع المعلم/ة</div>
                            <div style="border-bottom:1px solid #000; width:100px; margin-top:25px;"></div>
                        </div>
                        <div style="font-size:8px; color:#94a3b8;">مجمّع زايد التعليمي © 2026</div>
                        <div style="text-align:center;">
                            <div style="font-size:10px; font-weight:bold;">اعتماد الإدارة</div>
                            <div style="border-bottom:1px solid #000; width:100px; margin-top:25px;"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function exportPDF() {
            const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
            const canvas = await html2canvas(document.getElementById('main-plan'), { scale: 2 });
            pdf.addImage(canvas.toDataURL('image/jpeg', 1.0), 'JPEG', 0, 0, 210, 297);
            pdf.save("Lesson_Plan.pdf");
        }

        function exportWord() {
            const content = document.getElementById('plan-output').innerHTML;
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40' dir='rtl'><head><meta charset='utf-8'><style>body{font-family:Cairo,Arial;} table{width:100%; border-collapse:collapse;} th,td{border:1pt solid #ccc; padding:5px;} .section-header{background:#0f172a; color:white; padding:5px; font-weight:bold;}</style></head><body>";
            const footer = "</body></html>";
            const blob = new Blob(['\ufeff', header + content + footer], { type: 'application/msword' });
            saveAs(blob, 'Lesson_Plan.doc');
        }
    </script>
</body>
</html>
