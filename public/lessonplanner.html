<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التخطيط الدرسي الذكي - مجمّع زايد التعليمي الظيت الجنوبي</title>

    <!-- Scripts & Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- مكتبات تصدير ملفات Word -->
    <script src="https://cdn.jsdelivr.net/npm/docx@8.2.2/build/index.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-slate: #0f172a; --accent-blue: #2563eb; --success-green: #10b981; --uae-red: #b91c1c; }
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; }
        
        [lang="en"] { font-family: 'Roboto', sans-serif; direction: ltr; }
        
        /* خاصية التعديل المباشر */
        [contenteditable="true"] {
            transition: all 0.2s;
            outline: none;
            border-radius: 4px;
        }
        [contenteditable="true"]:hover {
            background-color: #f0f7ff;
            box-shadow: 0 0 0 2px #bfdbfe;
        }
        [contenteditable="true"]:focus {
            background-color: #fff;
            box-shadow: 0 0 0 2px #3b82f6;
        }

        .plan-container { width: 210mm; margin: 20px auto; background: transparent; }

        .plan-page {
            width: 210mm; min-height: 297mm; padding: 12mm; margin-bottom: 25px;
            background: white; border: 1px solid #e2e8f0; border-radius: 4px;
            position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .section-header { 
            background-color: var(--primary-slate); color: white; padding: 6px 12px; 
            font-weight: 800; font-size: 13px; margin-top: 12px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
        th, td { border: 0.5pt solid #cbd5e1; padding: 5px 8px; font-size: 10px; word-wrap: break-word; vertical-align: top; }
        th { background-color: #f8fafc; font-weight: 800; text-align: inherit; color: #1e293b; }

        .lo-mapping-card { border: 1pt solid #e2e8f0; border-right: 5px solid var(--accent-blue); margin-bottom: 8px; background: #f8fafc; border-radius: 4px; }
        .lo-header { background: #eff6ff; padding: 5px 10px; font-weight: 900; font-size: 11px; color: #1e40af; border-bottom: 1px solid #dbeafe; }
        .criteria-list { padding: 5px 10px; font-size: 10px; color: #059669; font-weight: 700; }
        
        .adaptation-box { border: 1px dashed #2563eb; background: #f0f7ff; padding: 8px; margin-top: 5px; border-radius: 4px; font-size: 9px; color: #1e40af; }

        .student-reflection-box { border: 2pt solid var(--success-green); background: #f0fdf4; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .emoji-scale { display: flex; gap: 10px; font-size: 12px; margin-top: 4px; }

        .indicator-box { border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; background: #f8fafc; font-size: 10px; border-right: 4px solid var(--accent-blue); }
        .indicator-title { font-weight: 900; color: #0f172a; border-bottom: 2px solid #e2e8f0; margin-bottom: 6px; padding-bottom: 4px; display: block; }

        .tag-badge {
            display: inline-flex; align-items: center; padding: 2px 6px; border-radius: 6px; font-size: 8px; font-weight: 800; margin: 1px; border: 1px solid currentColor;
        }
        .tag-real-world { background: #ecfdf5; color: #059669; }
        .tag-identity { background: #fef2f2; color: #b91c1c; }
        .tag-innovation { background: #eff6ff; color: #2563eb; }
        .tag-cross-curricular { background: #fdf4ff; color: #a21caf; }
        .tag-ibt { background: #fffbeb; color: #d97706; border-color: #fbbf24; }

        .measurement-badge { background: #f8fafc; border: 1px solid #cbd5e1; color: #475569; font-size: 8px; padding: 1px 4px; border-radius: 4px; margin-top: 4px; display: block; font-weight: bold; }

        .maiada-stamp { font-family: 'Cairo', sans-serif; font-weight: 900; font-size: 9px; color: #94a3b8; letter-spacing: 0.5px; text-align: center; line-height: 1.1; border: 1px solid #e2e8f0; padding: 4px; border-radius: 4px; }

        @media print { 
            .no-print { display: none; } 
            body { background: white; padding: 0; } 
            .plan-page { box-shadow: none; border: none; margin: 0; width: 100%; padding: 10mm; page-break-after: always; }
        }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--accent-blue); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="max-w-5xl mx-auto">

                <div class="text-center">

                    <p data-i18n="subtitle" class="text-emerald-600 font-bold text-lg italic">مؤشرات أداء كمية وآليات قياس مباشرة</p>

                <div class="w-[130px] hidden md:block"></div>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                <div>
                    <label data-i18n="lblSubject" class="block mb-1 text-xs font-black text-slate-500 uppercase">المادة</label>
                    <select id="subject-select" class="w-full p-3 rounded-xl border-2 border-slate-100 font-bold bg-slate-50">
                        <option value="اللغة العربية" data-i18n="optSubjAr">اللغة العربية</option>
                        <option value="اللغة الإنجليزية" data-i18n="optSubjEn">اللغة الإنجليزية</option>
                        <option value="الرياضيات" data-i18n="optSubjMath">الرياضيات</option>
                        <option value="العلوم" data-i18n="optSubjSci">العلوم</option>
                        <option value="التربية الإسلامية" data-i18n="optSubjIsl">التربية الإسلامية</option>
                        <option value="الدراسات الاجتماعية" data-i18n="optSubjSoc">الدراسات الاجتماعية</option>

                        <option value="الكيمياء" data-i18n="optSubjChem">الكيمياء</option>
                        <option value="الأحياء" data-i18n="optSubjBio">الأحياء</option>

                        <option value="8" data-i18n="optG8">الصف 8</option><option value="9" data-i18n="optG9">الصف 9</option><option value="10" data-i18n="optG10">الصف 10</option>
                        <option value="11" data-i18n="optG11">الصف 11</option><option value="12" data-i18n="optG12">الصف 12</option>

                    <select id="section-select" class="w-full p-3 rounded-xl border-2 border-slate-100 font-bold bg-slate-50">
                        <option value="العام" data-i18n="optSecGen">العام</option>
                        <option value="المتقدم" data-i18n="optSecAdv">المتقدم</option>
                        <option value="النخبة" data-i18n="optSecEli">النخبة</option>
                    </select>

                </div>

                <div>
                    <label data-i18n="lblSen" class="block mb-1 text-xs font-black text-slate-500 uppercase">فئة الاحتياجات الخاصة</label>
                    <select id="sen-category" class="w-full p-3 rounded-xl border-2 border-slate-100 font-bold bg-blue-50 border-blue-200">
                        <option value="none" data-i18n="optSenNone">لا يوجد (عام)</option>
                        <option value="شديدي الضعف (Low Achievers)" data-i18n="optSenLow">شديدي الضعف</option>
                        <option value="عسر القراءة (Dyslexia)" data-i18n="optSenDys">عسر القراءة</option>
                        <option value="طيف التوحد" data-i18n="optSenAut">طيف التوحد</option>
                        <option value="ADHD" data-i18n="optSenADHD">ADHD</option>
                        <option value="صعوبات تعلم" data-i18n="optSenLD">صعوبات تعلم</option>
                    </select>
                </div>
                <div>
                    <label data-i18n="lblTeacher" class="block mb-1 text-xs font-black text-slate-500 uppercase">المعلم/ة</label>
                    <input type="text" id="teacher-name" class="w-full p-3 rounded-xl border-2 border-slate-100 font-bold bg-slate-50" data-i18n-placeholder="placeholderTeacher" placeholder="اسم المعلم">
                </div>
                <div>
                    <label data-i18n="lblDate" class="block mb-1 text-xs font-black text-slate-500 uppercase">التاريخ</label>
                    <input type="date" id="lesson-date" class="w-full p-3 rounded-xl border-2 border-slate-100 font-bold bg-slate-50">
                </div>
            </div>

            <div class="space-y-4">
                <input type="text" id="ai-topic" class="w-full p-5 rounded-2xl border-2 border-blue-100 font-bold text-lg shadow-sm" data-i18n-placeholder="placeholderTopic" placeholder="عنوان الدرس المعتمد من المنهاج الوزاري...">
                <textarea id="manual-outcomes" rows="2" class="w-full p-5 rounded-2xl border-2 border-blue-100 font-bold shadow-sm" data-i18n-placeholder="placeholderOutcomes" placeholder="نواتج التعلم المستهدفة (SMART)..."></textarea>
                
                <button id="ai-generate-btn" class="w-full flex items-center justify-center gap-3 bg-slate-900 text-white font-black py-4 px-8 rounded-2xl shadow-2xl hover:bg-slate-800 transition-all">
                    <span id="ai-btn-text" data-i18n="btnGenerate">توليد التخطيط بمؤشرات التحصيل والتقدم 🚀</span>
                    <div id="ai-loader" class="loader hidden"></div>
                </button>
            </div>

            <div id="export-controls" class="mt-6 flex flex-wrap gap-3 hidden">
                <button id="word-download-btn" class="flex-1 min-w-[200px] bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-blue-800 flex items-center justify-center gap-2" data-i18n="btnWord">تصدير ملف Word 📝</button>
                <button id="pdf-download-btn" class="flex-1 min-w-[200px] bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 flex items-center justify-center gap-2" data-i18n="btnPdf">تصدير PDF 📄</button>
            </div>
        </div>

        <!-- Plan Output -->
        <div id="plan-output-container" class="plan-container">
            <div id="plan-output" class="hidden"></div>
            <div id="placeholder-box" class="bg-white/50 p-20 rounded-3xl border-4 border-dashed border-slate-300 text-center">
                <p data-i18n="placeholderOutput" class="text-slate-500 font-bold text-xl italic">سيتم عرض تخطيطك هنا بمؤشرات رقمية للتحصيل والتقدم وآليات قياس دقيقة لكل نشاط.</p>
            </div>
        </div>
    </div>

    <script>
        let currentPlanData = null;
        let currentLang = 'ar';

        const i18n = {
            ar: {
                title: "منصة التخطيط الذكي - مجمّع زايد التعليمي الظيت الجنوبي",
                subtitle: "مؤشرات أداء كمية وآليات قياس مباشرة",
                lblSubject: "المادة",
                lblGrade: "الصف",
                lblSection: "المسار",
                lblSen: "فئة الاحتياجات الخاصة",
                lblTeacher: "المعلم/ة",
                lblDate: "التاريخ",
                placeholderTeacher: "اسم المعلم",
                placeholderTopic: "عنوان الدرس المعتمد من المنهاج الوزاري...",
                placeholderOutcomes: "نواتج التعلم المستهدفة (SMART)...",
                btnGenerate: "توليد التخطيط بمؤشرات التحصيل والتقدم 🚀",
                btnGenerating: "جاري الحساب والربط بالمؤشرات...",
                btnWord: "تصدير ملف Word 📝",
                btnPdf: "تصدير PDF 📄",
                placeholderOutput: "سيتم عرض تخطيطك هنا بمؤشرات رقمية للتحصيل والتقدم وآليات قياس دقيقة لكل نشاط.",
                optSubjAr: "اللغة العربية", optSubjEn: "اللغة الإنجليزية", optSubjMath: "الرياضيات", optSubjSci: "العلوم", optSubjIsl: "التربية الإسلامية", optSubjSoc: "الدراسات الاجتماعية", optSubjPhy: "الفيزياء", optSubjChem: "الكيمياء", optSubjBio: "الأحياء", optSubjArt: "الفنون", optSubjPE: "التربية البدنية",
                optG5: "الصف 5", optG6: "الصف 6", optG7: "الصف 7", optG8: "الصف 8", optG9: "الصف 9", optG10: "الصف 10", optG11: "الصف 11", optG12: "الصف 12",
                optSecGen: "العام", optSecAdv: "المتقدم", optSecEli: "النخبة",
                optSenNone: "لا يوجد (عام)", optSenLow: "شديدي الضعف (Low Achievers)", optSenDys: "عسر القراءة (Dyslexia)", optSenAut: "طيف التوحد", optSenADHD: "ADHD", optSenLD: "صعوبات تعلم"
            },
            en: {
                title: "Smart Planning Platform - Zayed Educational Complex",
                subtitle: "Quantitative Performance Indicators & Direct Measurements",
                lblSubject: "Subject",
                lblGrade: "Grade",
                lblSection: "Stream",
                lblSen: "SEN Category",
                lblTeacher: "Teacher",
                lblDate: "Date",
                placeholderTeacher: "Teacher Name",
                placeholderTopic: "MOE Approved Lesson Topic...",
                placeholderOutcomes: "Targeted Learning Outcomes (SMART)...",
                btnGenerate: "Generate Plan with Indicators 🚀",
                btnGenerating: "Calculating & Linking Indicators...",
                btnWord: "Export Word 📝",
                btnPdf: "Export PDF 📄",
                placeholderOutput: "Your lesson plan will be displayed here with digital indicators and precise measurement mechanisms.",
                optSubjAr: "Arabic Language", optSubjEn: "English Language", optSubjMath: "Mathematics", optSubjSci: "Science", optSubjIsl: "Islamic Education", optSubjSoc: "Social Studies", optSubjPhy: "Physics", optSubjChem: "Chemistry", optSubjBio: "Biology", optSubjArt: "Arts", optSubjPE: "Physical Education",
                optG5: "Grade 5", optG6: "Grade 6", optG7: "Grade 7", optG8: "Grade 8", optG9: "Grade 9", optG10: "Grade 10", optG11: "Grade 11", optG12: "Grade 12",
                optSecGen: "General", optSecAdv: "Advanced", optSecEli: "Elite",
                optSenNone: "None (Mainstream)", optSenLow: "Low Achievers", optSenDys: "Dyslexia", optSenAut: "Autism Spectrum", optSenADHD: "ADHD", optSenLD: "Learning Difficulties"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

            const btnAr = document.getElementById('btn-lang-ar');
            const btnEn = document.getElementById('btn-lang-en');
            
            if(lang === 'ar') {
                btnAr.className = "px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white transition-colors";
                btnEn.className = "px-4 py-1 rounded-full text-sm font-bold text-slate-500 hover:bg-slate-100 transition-colors";
            } else {
                btnEn.className = "px-4 py-1 rounded-full text-sm font-bold bg-slate-900 text-white transition-colors";
                btnAr.className = "px-4 py-1 rounded-full text-sm font-bold text-slate-500 hover:bg-slate-100 transition-colors";
            }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.textContent = i18n[lang][key];
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (i18n[lang][key]) el.setAttribute('placeholder', i18n[lang][key]);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-lang-ar').addEventListener('click', () => setLanguage('ar'));
            document.getElementById('btn-lang-en').addEventListener('click', () => setLanguage('en'));

            const apiKey = ""; 
            const aiGenerateBtn = document.getElementById('ai-generate-btn');
            const aiBtnText = document.getElementById('ai-btn-text');
            const aiLoader = document.getElementById('ai-loader');
            const planOutput = document.getElementById('plan-output');
            const placeholderBox = document.getElementById('placeholder-box');
            const exportControls = document.getElementById('export-controls');

            async function fetchLessonPlan(subject, grade, topic, manualOutcomes, senCategory) {
                const isEnglish = (subject === "اللغة الإنجليزية");
                
                const promptText = `Generate a UAE MOE COMPLIANT LESSON PLAN in Arabic for: ${subject}, Grade: ${grade}, Topic: ${topic}.
                
                CRITICAL INSTRUCTIONS:
                1. For EACH activity, "assessmentForLearning" MUST follow this specific format:
                   "المؤشر: [رقمي]%، آلية القياس: [الأداة المستخدمة]"
                   Example: "المؤشر: تحصيل 85%، آلية القياس: ملاحظة مباشرة وحل تمرين رقم 1"
                2. In the "attainmentIndicator" and "progressIndicator" fields, provide a realistic numeric goal for this specific topic (e.g. 80% Attainment, 10% Progress).
                3. Keep the "teacher" field enriched with [الهوية الوطنية], [الربط بالواقع], [التكامل المعرفي], [اختبارات IBT].
                
                Return VALID JSON ONLY:
                {
                  "isEnglish": ${isEnglish},
                  "data": {
                    "title": "${topic}",
                    "strand": "المجال",
                    "moeStandard": "المعيار الوزاري",
                    "loMapped": [
                      { "lo": "الناتج التعليمي المستهدف", "criteria": ["معيار نجاح 1"], "adaptation": "مواءمة أصحاب الهمم (${senCategory})" }
                    ],
                    "attainmentIndicator": "مستهدف التحصيل: 80% من الطلبة يحققون الناتج بمستوى جيد فأعلى",
                    "progressIndicator": "مستهدف التقدم: زيادة 15% في دقة الإجابة مقارنة بالنشاط الاستهلالي",
                    "activities": [
                      {"type": "التمهيد (5د)", "teacher": "...", "student": "...", "time": "5", "assessmentForLearning": "المؤشر: تحصيل 75%، آلية القياس: الأسئلة السابرة", "evidence": "سجل الملاحظة", "resources": "...", "strategy": "..." },
                      {"type": "النشاط الأساسي (20د)", "teacher": "...", "student": "...", "time": "20", "assessmentForLearning": "المؤشر: تحصيل 85%، آلية القياس: تقييم الأقران وبطاقة الخروج", "evidence": "نتاج عمل الطالب", "resources": "...", "strategy": "..." },
                      {"type": "الغلق (10د)", "teacher": "...", "student": "...", "time": "10", "assessmentForLearning": "المؤشر: تحصيل 90%، آلية القياس: الاختبار القصير (Quiz)", "evidence": "النتائج الرقمية", "resources": "...", "strategy": "..." }
                    ],
                    "plenaryFlow": "ملخص الغلق الختامي",
                    "diffMatrix": { "gifted": "..", "high": "..", "mid": "..", "low": "..", "sen": ".." },
                    "studentReflection": { "prompts": ["ماذا تعلمت اليوم؟"] }
                  }
                }`;

                const response = await fetch("http://localhost:3000/api/generate-lesson", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        prompt: promptText
                    })
                });

                const apiResult = await response.json();
                console.log("RAW SERVER RESPONSE:", apiResult);

                if (!response.ok) {
                    throw new Error(apiResult.error || "Server error");
                }

                // ✅ FIX: Extract the JSON text from Gemini's response structure
                const textContent = apiResult.candidates[0].content.parts[0].text;
                console.log("EXTRACTED TEXT:", textContent);

                // ✅ FIX: Clean and parse the JSON
                const cleanedText = textContent.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                const parsedPlan = JSON.parse(cleanedText);
                
                console.log("PARSED PLAN:", parsedPlan);
                return parsedPlan;
            }

            function formatTags(text) {
                if(!text) return "";
                return text
                    .replace(/\[الربط بالواقع\]/g, '<span class="tag-badge tag-real-world">🌍 الربط بالواقع</span>')
                    .replace(/\[الهوية الوطنية\]/g, '<span class="tag-badge tag-identity">🇦🇪 الهوية الوطنية</span>')
                    .replace(/\[التكامل المعرفي\]/g, '<span class="tag-badge tag-cross-curricular">🔗 التكامل المعرفي</span>')
                    .replace(/\[اختبارات IBT\]/g, '<span class="tag-badge tag-ibt">📝 اختبارات IBT</span>')
                    .replace(/\[الابتكار\]/g, '<span class="tag-badge tag-innovation">💡 الابتكار</span>');
            }

            function formatAssessment(text) {
                if(!text) return "";
                const parts = text.split("، آلية القياس:");
                if(parts.length > 1) {
                    return `<div><strong>${parts[0]}</strong></div><div class="measurement-badge">🛠 ${parts[1]}</div>`;
                }
                return text;
            }

            aiGenerateBtn.addEventListener('click', async () => {
                const topic = document.getElementById('ai-topic').value;
                const subject = document.getElementById('subject-select').value;
                const grade = document.getElementById('grade-select').value;
                const sen = document.getElementById('sen-category').value;
                const manual = document.getElementById('manual-outcomes').value;
                const teacher = document.getElementById('teacher-name').value || "..................";
                const date = document.getElementById('lesson-date').value || new Date().toLocaleDateString('ar-AE');

                if (!topic) return alert(currentLang === 'ar' ? "يرجى إدخال عنوان الدرس" : "Please enter the lesson topic");

                aiGenerateBtn.disabled = true; aiLoader.classList.remove('hidden');
                aiBtnText.textContent = i18n[currentLang].btnGenerating;

                try {
                    const plan = await fetchLessonPlan(subject, grade, topic, manual, sen);
                    currentPlanData = { ...plan, teacher, date, subject, grade };
                    renderPlan(currentPlanData);
                    placeholderBox.classList.add('hidden');
                    planOutput.classList.remove('hidden');
                    exportControls.classList.remove('hidden');
                } catch (e) {
                    console.error("ERROR:", e);
                    alert(currentLang === 'ar' ? "حدث خطأ في التوليد: " + e.message : "Error generating plan: " + e.message);
                } finally {
                    aiGenerateBtn.disabled = false; aiLoader.classList.add('hidden');
                    aiBtnText.textContent = i18n[currentLang].btnGenerate;
                }
            });

            function renderPlan(plan) {
                const isEnglish = plan.isEnglish;
                const dir = isEnglish ? "ltr" : "rtl";
                const data = plan.data;

                planOutput.innerHTML = `
                <div class="plan-page" style="direction: ${dir};">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom: 3pt solid #0f172a; padding-bottom:10px; margin-bottom:15px;">
                        <img src="https://board-ey1r.onrender.com/icons/logo.png" style="width: 100px;">
                        <div style="text-align:center;">
                            <div style="font-weight: 800; font-size: 14px;">مجمّع زايد التعليمي الظيت الجنوبي</div>
                            <h1 style="font-size: 22px; font-weight: 900; color: #0f172a; margin: 5px 0;">التخطيط الدرسي المتكامل (UAE DSIB)</h1>
                        </div>
                        <div class="mnagment-stamp">APPROVED BY<br></div>
                    </div>

                    <table>
                        <tr>
                            <th width="15%">المادة</th><td id="cell-subject" contenteditable="true" style="font-weight:900;">${plan.subject}</td>
                            <th width="10%">الصف</th><td id="cell-grade" contenteditable="true" style="text-align:center;">${plan.grade}</td>
                        </tr>
                        <tr>
                            <th>عنوان الدرس</th><td id="cell-title" contenteditable="true" colspan="3" style="font-weight:900; color:#b91c1c;">${data.title}</td>
                        </tr>
                        <tr>
                            <th>المعلم/ة</th><td id="cell-teacher" contenteditable="true">${plan.teacher}</td>
                            <th>التاريخ</th><td id="cell-date" contenteditable="true" style="text-align:center;">${plan.date}</td>
                        </tr>
                        <tr style="background:#f8fafc;">
                            <th>المجال</th><td id="cell-strand" contenteditable="true">${data.strand}</td>
                            <th>المعيار</th><td id="cell-standard" contenteditable="true" style="text-align:center;">${data.moeStandard}</td>
                        </tr>
                    </table>

                    <div class="section-header">نواتج التعلم ومؤشرات النجاح المستهدفة</div>
                    <div id="lo-section" style="margin-top:8px;">
                        ${data.loMapped.map((lo) => `
                            <div class="lo-mapping-card">
                                <div class="lo-header" contenteditable="true">الناتج: ${lo.lo}</div>
                                <div class="criteria-list" contenteditable="true">
                                    ${lo.criteria.map(c => `<div>✔ ${c}</div>`).join('')}
                                </div>
                                <div class="adaptation-box" contenteditable="true">
                                    <strong>♿ مواءمة أصحاب الهمم:</strong> ${lo.adaptation}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-header" style="background:#334155;">سير الحصة المدمج بالقياس الرقمي (35 دقيقة)</div>
                    <table style="margin-top:8px;">
                        <thead>
                            <tr style="font-size: 8px;">
                                <th width="12%">المرحلة</th>
                                <th>دور المعلم (الروابط)</th>
                                <th>دور المتعلم</th>
                                <th width="20%">المؤشر وآلية القياس</th>
                                <th width="10%">الأدلة</th>
                                <th width="5%">زمن</th>
                            </tr>
                        </thead>
                        <tbody id="activities-body">
                            ${data.activities.map(a => `
                                <tr>
                                    <td contenteditable="true" style="font-weight:bold; text-align:center;">${a.type}</td>
                                    <td contenteditable="true">${formatTags(a.teacher)}</td>
                                    <td contenteditable="true">${a.student}</td>
                                    <td contenteditable="true" style="color:#1e40af;">${formatAssessment(a.assessmentForLearning)}</td>
                                    <td contenteditable="true">${a.evidence}</td>
                                    <td contenteditable="true" style="text-align:center;">${a.time}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="plan-page" style="direction: ${dir};">
                    <div class="section-header" style="background:#b91c1c;">الغلق الختامي ومصفوفة التمايز</div>
                    <div style="border:2px solid #b91c1c; padding:10px; border-radius:0 0 10px 10px; background:#fffcfc;">
                        <div id="cell-plenary" contenteditable="true" style="font-size:11px; margin-bottom:10px; font-weight:bold;">
                            ${data.plenaryFlow}
                        </div>
                        <table style="text-align:center; font-size:9px;">
                            <tr style="background:#fef2f2; font-weight:900;">
                                <td>موهوبين</td><td>متفوقين</td><td>متوسط</td><td>دعم</td><td>أصحاب همم</td>
                            </tr>
                            <tr>
                                <td contenteditable="true">${data.diffMatrix.gifted}</td>
                                <td contenteditable="true">${data.diffMatrix.high}</td>
                                <td contenteditable="true">${data.diffMatrix.mid}</td>
                                <td contenteditable="true">${data.diffMatrix.low}</td>
                                <td contenteditable="true">${data.diffMatrix.sen}</td>
                            </tr>
                        </table>
                    </div>

                    <div class="section-header" style="background:#475569; margin-top:20px;">مؤشرات الأداء النهائية للحصة (DSIB Measured Indicators)</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                        <div class="indicator-box">
                            <span class="indicator-title">📈 مؤشر التحصيل (Attainment)</span>
                            <p id="cell-attainment" contenteditable="true" style="font-weight:bold; color:#b91c1c;">${data.attainmentIndicator}</p>
                            <small style="font-size:8px; color:#64748b;">* يتم التحقق من خلال تحليل مخرجات النشاط الأساسي والختامي.</small>
                        </div>
                        <div class="indicator-box">
                            <span class="indicator-title">🔄 مؤشر التقدم (Progress)</span>
                            <p id="cell-progress" contenteditable="true" style="font-weight:bold; color:#2563eb;">${data.progressIndicator}</p>
                            <small style="font-size:8px; color:#64748b;">* قياس الفارق بين مستوى المعرفة القبلية (التمهيد) والمعرفة المكتسبة.</small>
                        </div>
                    </div>

                    <div class="student-reflection-box">
                        <h3 style="font-weight:900; color:#065f46; font-size:11px;">🎓 التقييم الذاتي للطلبة (Reflection)</h3>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div id="reflection-prompts">
                                ${data.studentReflection.prompts.map(p => `
                                    <div style="background:white; padding:5px; border-radius:5px; margin-top:5px; border:1px solid #d1fae5; font-size:10px;">
                                        <strong contenteditable="true">${p}</strong>
                                        <div class="emoji-scale">🤩 🙂 😐</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="background:white; padding:5px; border-radius:5px; border:1px solid #d1fae5; font-size:10px;">
                                <strong contenteditable="true">أين أرى تقدمي اليوم؟</strong>
                                <div style="height:30px; border-bottom:1px dotted #ccc; margin-top:5px;"></div>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top:auto; padding:20px; border:1px solid #e2e8f0; border-radius:10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="text-align:center;">
                                <div style="font-size:11px; font-weight:700;">توقيع المعلم/ة</div>
                                <div style="border-bottom:1pt solid #0f172a; width:120px; margin-top:30px;"></div>
                            </div>
                            <div style="font-size:9px; color:#94a3b8; text-align:center;">
                                مجمّع زايد التعليمي الظيت الجنوبي © 2026
                            </div>
                            <div style="text-align:center;">
                                <div style="font-size:11px; font-weight:700;">اعتماد الإدارة</div>
                                <div style="color:#0f172a; font-size:16px; font-weight:900; margin-top:5px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }

            // تصدير Word ليكون مطابقاً تماماً للمعاينة
            document.getElementById('word-download-btn').addEventListener('click', () => {
                if (!planOutput.innerHTML) return;
                const title = document.getElementById('cell-title').innerText || 'تخطيط';
                const content = document.getElementById('plan-output').innerHTML;
                
                const htmlStr = `
                <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40" dir="rtl">
                <head>
                    <meta charset="utf-8">
                    <title>${title}</title>
                    <style>
                        body { font-family: 'Cairo', Arial, sans-serif; direction: rtl; }
                        .plan-page { width: 100%; margin-bottom: 20px; page-break-after: always; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
                        th, td { border: 1pt solid #cbd5e1; padding: 5px 8px; font-size: 12px; vertical-align: top; text-align: right; }
                        th { background-color: #f8fafc; font-weight: bold; color: #1e293b; }
                        .section-header { background-color: #0f172a; color: white; padding: 8px 12px; font-weight: bold; font-size: 14px; margin-top: 15px; margin-bottom: 10px; border-radius: 4px; }
                        .lo-mapping-card { border: 1pt solid #e2e8f0; border-right: 5px solid #2563eb; margin-bottom: 8px; background: #f8fafc; padding: 5px; }
                        .lo-header { background: #eff6ff; padding: 5px; font-weight: bold; color: #1e40af; border-bottom: 1px solid #dbeafe; }
                        .criteria-list { padding: 5px; color: #059669; font-weight: bold; }
                        .adaptation-box { border: 1px dashed #2563eb; background: #f0f7ff; padding: 8px; margin-top: 5px; font-size: 11px; color: #1e40af; }
                        .student-reflection-box { border: 2pt solid #10b981; background: #f0fdf4; padding: 10px; border-radius: 10px; margin-top: 10px; }
                        .indicator-box { border: 1px solid #e2e8f0; padding: 10px; background: #f8fafc; border-right: 4px solid #2563eb; margin-bottom: 10px; }
                        .indicator-title { font-weight: bold; color: #0f172a; border-bottom: 2px solid #e2e8f0; display: block; padding-bottom: 4px; margin-bottom: 6px; }
                        .tag-badge { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 2px 6px; border-radius: 6px; font-size: 10px; margin: 2px; display: inline-block; }
                        .measurement-badge { background: #f8fafc; border: 1px solid #cbd5e1; font-size: 10px; padding: 4px; margin-top: 4px; display: block; font-weight: bold; }
                        .maiada-stamp { font-weight: bold; font-size: 10px; color: #94a3b8; text-align: center; border: 1px solid #e2e8f0; padding: 4px; display: inline-block; }
                    </style>
                </head>
                <body>
                    ${content}
                </body>
                </html>
                `;

                const blob = new Blob(['\ufeff', htmlStr], { type: 'application/msword' });
                saveAs(blob, `تخطيط_${title}.doc`);
            });

            // تحسين تصدير الـ PDF ليحافظ على الأبعاد التناسبية
            document.getElementById('pdf-download-btn').addEventListener('click', async () => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pages = document.querySelectorAll('.plan-page');
                
                for (let i = 0; i < pages.length; i++) {
                    const canvas = await html2canvas(pages[i], { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/jpeg', 1.0);
                    
                    const pdfWidth = 210;
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width; // يحافظ على النسبة والتناسب
                    
                    if (i > 0) pdf.addPage();
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                }
                pdf.save(`تخطيط_${document.getElementById('cell-title').innerText}.pdf`);
            });
        });
    </script>
</body>
</html>
