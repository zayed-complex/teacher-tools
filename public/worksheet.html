<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد أوراق العمل المتمايزة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Cairo', sans-serif;" class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h1 class="text-3xl font-black text-center text-emerald-700 mb-8">📝 مولد ورقة العمل المتمايزة</h1>
            
            <form id="worksheetForm" class="space-y-6">
                <div>
                    <label class="block font-bold mb-2">المادة الدراسية</label>
                    <input type="text" id="subject" required class="w-full p-3 border rounded-lg">
                </div>
                
                <div>
                    <label class="block font-bold mb-2">الصف</label>
                    <input type="text" id="grade" required class="w-full p-3 border rounded-lg" placeholder="مثال: 5">
                </div>
                
                <div>
                    <label class="block font-bold mb-2">الموضوع</label>
                    <input type="text" id="topic" required class="w-full p-3 border rounded-lg" placeholder="مثال: الكسور">
                </div>
                
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">
                    🚀 توليد ورقة العمل
                </button>
            </form>
            
            <div id="result" class="mt-8 hidden">
                <div class="border-t pt-6">
                    <h2 class="text-2xl font-bold mb-4">النتيجة:</h2>
                    <div id="worksheetContent" class="bg-gray-50 p-4 rounded-lg"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('worksheetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                subject: document.getElementById('subject').value,
                grade: document.getElementById('grade').value,
                topic: document.getElementById('topic').value,
                lang: 'ar'
            };
            
            document.getElementById('result').classList.add('hidden');
            
            try {
                const response = await fetch('/api/generate-worksheet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayWorksheet(data.data);
                } else {
                    alert('خطأ: ' + data.error);
                }
            } catch (error) {
                alert('حدث خطأ: ' + error.message);
            }
        });
        
        function displayWorksheet(data) {
            const container = document.getElementById('worksheetContent');
            container.innerHTML = `
                <h3 class="text-xl font-bold">${data.title}</h3>
                <p><strong>المعيار:</strong> ${data.standard}</p>
                <p><strong>السؤال الجوهري:</strong> ${data.essentialQuestion}</p>
                
                <div class="mt-4">
                    <h4 class="font-bold text-lg">${data.worksheet.level1.title}</h4>
                    <ul class="list-disc pr-8">
                        ${data.worksheet.level1.questions.map(q => `<li>${q}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="mt-4">
                    <h4 class="font-bold text-lg">${data.worksheet.level2.title}</h4>
                    <ul class="list-disc pr-8">
                        ${data.worksheet.level2.questions.map(q => `<li>${q}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="mt-4">
                    <h4 class="font-bold text-lg">${data.worksheet.level3.title}</h4>
                    <ul class="list-disc pr-8">
                        ${data.worksheet.level3.questions.map(q => `<li>${q}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="mt-4">
                    <h4 class="font-bold text-lg">التقييم الذاتي</h4>
                    ${data.selfAssessment.map(s => `<p>✓ ${s.criteria}</p>`).join('')}
                </div>
            `;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
