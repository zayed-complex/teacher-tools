<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد أوراق العمل الذكي - مجمّع زايد التعليمي</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans Arabic', 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .dotted-line { 
            border-bottom: 1px dotted #cbd5e1; 
            height: 35px; 
            width: 100%; 
            margin-bottom: 8px; 
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #printable-area { 
                border: none !important; 
                box-shadow: none !important; 
                padding: 20px !important; 
                width: 100% !important; 
                margin: 0 !important; 
            }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================
        // TRANSLATIONS
        // ============================================
        const i18n = {
            ar: {
                sidebarTitle: "إعداد ورقة العمل",
                teacherNameRef: "",
                subject: "المادة الدراسية",
                grade: "الصف الدراسي",
                teacherInput: "اسم المعلم",
                topicInput: "موضوع الدرس",
                selectSubject: "اختر المادة الدراسية ...",
                selectGrade: "اختر الصف الدراسي ...",
                generateBtn: "📝 توليد ورقة العمل",
                savedFiles: "الملفات المحفوظة",
                noTitle: "بدون عنوان",
                placeholder: "قم باختيار موضوع الدرس لتوليد ورقة العمل",
                exportWord: "تصدير Word",
                print: "طباعة",
                error: "يرجى التأكد من اختيار المادة والصف وكتابة الموضوع.",
                genError: "حدث خطأ أثناء توليد ورقة العمل. تأكد من تشغيل الخادم.",
                schoolName: "مجمّع زايد التعليمي ح2 وح3",
                studentName: "اسم الطالب",
                section: "الشعبة",
                date: "التاريخ",
                uae: "دولة الإمارات العربية المتحدة",
                moe: "وزارة التربية والتعليم",
                sheetTitle: "ورقة عمل متمايزة",
                criteria: "المعيار",
                essentialQ: "السؤال الأساسي",
                selfAssessment: "التقييم الذاتي (التقويم من أجل التعلم)",
                proficient: "متقن",
                needPractice: "أحتاج تدريب",
                footer: "مجمّع زايد التعليمي - نظام أوراق العمل الذكي المطور",
                loading: "⏳ جاري التوليد...",
                delete: "حذف"
            },
            en: {
                sidebarTitle: "Worksheet Setup",
                teacherNameRef: "Dr. Ali Ahmed",
                subject: "Subject",
                grade: "Grade Level",
                teacherInput: "Teacher Name",
                topicInput: "Lesson Topic",
                selectSubject: "Select Subject ...",
                selectGrade: "Select Grade ...",
                generateBtn: "📝 Generate Worksheet",
                savedFiles: "Saved Files",
                noTitle: "Untitled",
                placeholder: "Select a topic to generate the worksheet",
                exportWord: "Export Word",
                print: "Print",
                error: "Please select subject, grade and enter a topic.",
                genError: "Error generating worksheet. Make sure server is running.",
                schoolName: "Zayed Educational Complex C2 & C3",
                studentName: "Student Name",
                section: "Section",
                date: "Date",
                uae: "United Arab Emirates",
                moe: "Ministry of Education",
                sheetTitle: "Differentiated Worksheet",
                criteria: "Standard",
                essentialQ: "Essential Question",
                selfAssessment: "Self-Assessment (AfL)",
                proficient: "Proficient",
                needPractice: "Needs Practice",
                footer: "Zayed Educational Complex - Smart Worksheet System",
                loading: "⏳ Generating...",
                delete: "Delete"
            }
        };

        const subjectsList = {
            ar: ["الرياضيات", "العلوم", "الفيزياء", "الكيمياء", "الأحياء", "اللغة العربية", "اللغة الإنجليزية", "الدراسات الاجتماعية", "التربية الإسلامية"],
            en: ["Mathematics", "Science", "Physics", "Chemistry", "Biology", "Arabic Language", "English Language", "Social Studies", "Islamic Education"]
        };
        
        const gradesList = {
            ar: ["الخامس", "السادس", "السابع", "الثامن", "التاسع", "العاشر", "الحادي عشر", "الثاني عشر"],
            en: ["Grade 5", "Grade 6", "Grade 7", "Grade 8", "Grade 9", "Grade 10", "Grade 11", "Grade 12"]
        };

        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        function App() {
            const [lang, setLang] = useState('ar');
            const [subject, setSubject] = useState('');
            const [grade, setGrade] = useState('');
            const [topic, setTopic] = useState('');
            const [teacherName, setTeacherName] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [currentPlan, setCurrentPlan] = useState(null);
            const [worksheets, setWorksheets] = useState([]);

            const t = i18n[lang];

            // Load worksheets from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('worksheets');
                if (saved) {
                    try {
                        setWorksheets(JSON.parse(saved));
                    } catch (e) {
                        console.error('Error loading worksheets:', e);
                    }
                }
            }, []);

            // ============================================
            // GENERATE WORKSHEET FUNCTION
            // ============================================
            const generateWorksheet = async () => {
                if (!subject || !grade || !topic) {
                    setError(t.error);
                    return;
                }

                setLoading(true);
                setError(null);

                try {
                    // Call backend API
                    const response = await fetch('/api/generate-worksheet', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            subject: subject,
                            grade: grade,
                            topic: topic,
                            lang: lang
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || t.genError);
                    }

                    // Create worksheet object
                    const newWorksheet = {
                        ...data.data,
                        subject: subject,
                        grade: grade,
                        teacher: teacherName || "..................",
                        school: t.schoolName,
                        createdAt: new Date().toISOString(),
                        docLang: lang,
                        id: Date.now().toString()
                    };

                    // Save to localStorage
                    const updated = [...worksheets, newWorksheet];
                    localStorage.setItem('worksheets', JSON.stringify(updated));
                    setWorksheets(updated);
                    setCurrentPlan(newWorksheet);

                } catch (err) {
                    console.error('Error:', err);
                    setError(err.message || t.genError);
                } finally {
                    setLoading(false);
                }
            };

            // ============================================
            // DELETE WORKSHEET FUNCTION
            // ============================================
            const deleteWorksheet = (id, e) => {
                e.stopPropagation();
                const updated = worksheets.filter(w => w.id !== id);
                localStorage.setItem('worksheets', JSON.stringify(updated));
                setWorksheets(updated);
                if (currentPlan?.id === id) {
                    setCurrentPlan(null);
                }
            };

            // ============================================
            // EXPORT TO WORD FUNCTION
            // ============================================
            const exportToWord = () => {
                if (!currentPlan) return;

                const originalContent = document.getElementById('printable-area');
                const contentClone = originalContent.cloneNode(true);
                
                // Replace dotted lines with Word-friendly lines
                contentClone.querySelectorAll('.dotted-line').forEach(el => {
                    const wordLine = document.createElement('div');
                    wordLine.innerHTML = "....................................................................................................................................";
                    wordLine.style.color = "#94a3b8";
                    wordLine.style.marginTop = "10pt";
                    wordLine.style.marginBottom = "10pt";
                    el.parentNode.replaceChild(wordLine, el);
                });

                contentClone.querySelectorAll('.no-print').forEach(el => el.remove());

                const isRtl = (currentPlan.docLang || 'ar') === 'ar';
                const header = `
                    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                    <head>
                        <meta charset='utf-8'>
                        <style>
                            @page { size: A4; margin: 1.5cm; }
                            body { font-family: 'Arial', sans-serif; direction: ${isRtl ? 'rtl' : 'ltr'}; text-align: ${isRtl ? 'right' : 'left'}; }
                            table { border-collapse: collapse; width: 100%; margin-bottom: 15pt; }
                            td, th { border: 0.5pt solid #000; padding: 8pt; vertical-align: top; }
                            .no-border td { border: none !important; }
                        </style>
                    </head>
                    <body>
                `;
                const footer = "</body></html>";
                
                const sourceHTML = header + contentClone.innerHTML + footer;
                const blob = new Blob(['\ufeff', sourceHTML], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement("a");
                a.href = url;
                a.download = `Worksheet_${currentPlan.title || 'lesson'}.doc`;
                a.click();
                URL.revokeObjectURL(url);
            };

            // ============================================
            // RENDER
            // ============================================
            return (
                <div 
                    className={`min-h-screen bg-slate-100 font-sans p-4 transition-all duration-300 ${lang === 'ar' ? 'text-right' : 'text-left'}`} 
                    dir={lang === 'ar' ? 'rtl' : 'ltr'}
                >
                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
                        
                        {/* ==================== SIDEBAR ==================== */}
                        <div className="lg:col-span-1 space-y-4 no-print">
                            {/* FORM CARD */}
                            <div className="bg-white p-6 rounded-2xl shadow-md border border-slate-200 sticky top-4">
                                <div className="flex justify-between items-start mb-4">
                                    <h2 className="text-xl font-bold text-sky-900">📋 {t.sidebarTitle}</h2>
                                    {/* Language Toggle */}
                                    <button 
                                        onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')}
                                        className="flex items-center gap-1 bg-slate-100 p-1 rounded-full border border-slate-200 hover:bg-sky-50 transition-colors"
                                    >
                                        <div className={`px-2 py-0.5 rounded-full text-[10px] font-bold transition-all ${lang === 'ar' ? 'bg-sky-600 text-white shadow-sm' : 'text-slate-400'}`}>AR</div>
                                        <div className={`px-2 py-0.5 rounded-full text-[10px] font-bold transition-all ${lang === 'en' ? 'bg-sky-600 text-white shadow-sm' : 'text-slate-400'}`}>EN</div>
                                    </button>
                                </div>
                                <p className="text-sm font-bold text-sky-600 mb-6 italic">{t.teacherNameRef}</p>
                                
                                <div className="space-y-4">
                                    {/* SUBJECT */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">{t.subject}</label>
                                        <select 
                                            value={subject} 
                                            onChange={(e) => setSubject(e.target.value)}
                                            className="w-full p-3 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-sky-500"
                                        >
                                            <option value="">{t.selectSubject}</option>
                                            {subjectsList[lang].map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>

                                    {/* GRADE */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">{t.grade}</label>
                                        <select 
                                            value={grade} 
                                            onChange={(e) => setGrade(e.target.value)}
                                            className="w-full p-3 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-sky-500"
                                        >
                                            <option value="">{t.selectGrade}</option>
                                            {gradesList[lang].map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                    </div>

                                    {/* TEACHER NAME */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">{t.teacherInput}</label>
                                        <input 
                                            type="text" 
                                            value={teacherName} 
                                            onChange={(e) => setTeacherName(e.target.value)}
                                            placeholder={`${t.teacherInput}...`}
                                            className="w-full p-3 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-sky-500"
                                        />
                                    </div>

                                    {/* TOPIC */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1 block">{t.topicInput}</label>
                                        <input 
                                            type="text" 
                                            value={topic} 
                                            onChange={(e) => setTopic(e.target.value)}
                                            placeholder={lang === 'ar' ? 'مثال: القوة والحركة' : 'e.g. Force and Motion'}
                                            className="w-full p-3 border rounded-xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-sky-500"
                                        />
                                    </div>

                                    {/* ERROR MESSAGE */}
                                    {error && (
                                        <div className="text-red-500 text-xs font-bold p-2 bg-red-50 rounded-lg border border-red-200">
                                            ⚠️ {error}
                                        </div>
                                    )}

                                    {/* GENERATE BUTTON */}
                                    <button 
                                        onClick={generateWorksheet} 
                                        disabled={loading}
                                        className="w-full bg-sky-600 hover:bg-sky-700 disabled:bg-slate-400 text-white font-bold py-4 rounded-xl transition active:scale-95"
                                    >
                                        {loading ? t.loading : t.generateBtn}
                                    </button>
                                </div>
                            </div>

                            {/* SAVED WORKSHEETS */}
                            <div className="bg-white p-4 rounded-2xl shadow-md border border-slate-200">
                                <h3 className="text-sm font-bold mb-3 text-slate-600 border-b pb-2">📚 {t.savedFiles}</h3>
                                <div className="space-y-2 max-h-60 overflow-y-auto custom-scrollbar">
                                    {worksheets.length === 0 ? (
                                        <p className="text-xs text-slate-400 italic p-2">{lang === 'ar' ? 'لا توجد ملفات محفوظة' : 'No saved worksheets'}</p>
                                    ) : (
                                        worksheets.map(ws => (
                                            <div 
                                                key={ws.id} 
                                                onClick={() => setCurrentPlan(ws)}
                                                className={`p-2 rounded-lg text-xs font-bold cursor-pointer flex justify-between items-center transition-colors ${
                                                    currentPlan?.id === ws.id 
                                                        ? 'bg-sky-100 text-sky-900 border border-sky-200' 
                                                        : 'bg-slate-50 hover:bg-slate-100'
                                                }`}
                                            >
                                                <span className="truncate">{ws.title || t.noTitle}</span>
                                                <button 
                                                    onClick={(e) => deleteWorksheet(ws.id, e)}
                                                    className="text-red-400 hover:text-red-600 p-1 flex-shrink-0"
                                                    title={t.delete}
                                                >
                                                    🗑️
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* ==================== MAIN CONTENT ==================== */}
                        <div className="lg:col-span-3">
                            {currentPlan ? (
                                <>
                                    {/* WORKSHEET PAPER */}
                                    <div 
                                        className="bg-white p-[15mm] shadow-2xl min-h-[297mm] border border-slate-300 relative mx-auto overflow-hidden" 
                                        id="printable-area" 
                                        style={{ width: '210mm' }}
                                        dir={(currentPlan.docLang || 'ar') === 'ar' ? 'rtl' : 'ltr'}
                                    >
                                        
                                        {/* HEADER */}
                                        <table className="w-full mb-6" style={{ borderCollapse: 'collapse' }}>
                                            <tbody>
                                                <tr>
                                                    <td style={{ width: '33%', textAlign: (currentPlan.docLang || 'ar') === 'ar' ? 'right' : 'left', borderRight: 'none', borderLeft: 'none', borderTop: 'none', borderBottom: 'none' }}>
                                                        <div className="text-[12px] font-bold leading-tight">
                                                            <p>{t.uae}</p>
                                                            <p>{t.moe}</p>
                                                            <p>{currentPlan.school}</p>
                                                        </div>
                                                    </td>
                                                    <td style={{ width: '34%', textAlign: 'center', borderRight: 'none', borderLeft: 'none', borderTop: 'none', borderBottom: 'none' }}>
                                                        <h1 className="text-[16px] font-bold text-blue-900 uppercase">{t.sheetTitle}</h1>
                                                    </td>
                                                    <td style={{ width: '33%', textAlign: (currentPlan.docLang || 'ar') === 'ar' ? 'left' : 'right', borderRight: 'none', borderLeft: 'none', borderTop: 'none', borderBottom: 'none' }}>
                                                        <div className="text-[11px] font-bold leading-tight">
                                                            <p>📚 {t.subject}: {currentPlan.subject}</p>
                                                            <p>📊 {t.grade}: {currentPlan.grade}</p>
                                                            <p>👨‍🏫 {t.teacherInput}: {currentPlan.teacher}</p>
                                                            <p>📅 {t.date}: {new Date().toLocaleDateString('en-GB')}</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>

                                        {/* STUDENT INFO */}
                                        <table className="w-full mb-6" style={{ borderCollapse: 'collapse' }}>
                                            <tbody>
                                                <tr>
                                                    <td style={{ width: '70%', borderRight: 'none', borderLeft: 'none', borderTop: 'none', borderBottom: 'none' }} className="font-bold text-sm">{t.studentName}: ............................................................................</td>
                                                    <td style={{ width: '30%', textAlign: 'center', borderRight: 'none', borderLeft: 'none', borderTop: 'none', borderBottom: 'none' }} className="font-bold text-sm">{t.section}: ............</td>
                                                </tr>
                                            </tbody>
                                        </table>

                                        {/* CONTENT HEADER */}
                                        <div className={`mb-6 border-${(currentPlan.docLang || 'ar') === 'ar' ? 'r' : 'l'}-4 border-blue-900 px-4`}>
                                            <h2 className="text-xl font-bold text-blue-900 mb-1">{currentPlan.title}</h2>
                                            <p className="text-[11px] font-bold text-slate-600 italic">{t.criteria}: {currentPlan.standard}</p>
                                            <p className="text-[11px] font-bold text-sky-700 mt-1">{t.essentialQ}: {currentPlan.essentialQuestion}</p>
                                        </div>

                                        {/* QUESTION GROUPS */}
                                        <div className="space-y-8">
                                            {[
                                                { 
                                                    data: currentPlan.worksheet.level1, 
                                                    color: '#059669', 
                                                    label: (currentPlan.docLang || 'ar') === 'ar' ? 'المجموعة الأولى' : 'Group 1' 
                                                },
                                                { 
                                                    data: currentPlan.worksheet.level2, 
                                                    color: '#2563eb', 
                                                    label: (currentPlan.docLang || 'ar') === 'ar' ? 'المجموعة الثانية' : 'Group 2' 
                                                },
                                                { 
                                                    data: currentPlan.worksheet.level3, 
                                                    color: '#7c3aed', 
                                                    label: (currentPlan.docLang || 'ar') === 'ar' ? 'أسئلة التحدي' : 'Challenge Questions' 
                                                }
                                            ].map((level, idx) => (
                                                <div key={idx} className="overflow-hidden rounded-lg border" style={{ borderColor: level.color }}>
                                                    <div className="px-4 py-2 text-white font-bold text-sm" style={{ backgroundColor: level.color }}>
                                                        {level.data?.title || level.label}
                                                    </div>
                                                    <div className="p-4 bg-white">
                                                        {(level.data?.questions || []).map((q, i) => (
                                                            <div key={i} className="mb-8 last:mb-2">
                                                                <p className="text-sm font-bold mb-4">{i+1}. {q}</p>
                                                                <div className="dotted-line"></div>
                                                                <div className="dotted-line"></div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* SELF-ASSESSMENT TABLE */}
                                        <div className="mt-12">
                                            <table className="w-full text-sm" style={{ borderCollapse: 'collapse' }}>
                                                <thead>
                                                    <tr className="bg-blue-900 text-white">
                                                        <th style={{ textAlign: (currentPlan.docLang || 'ar') === 'ar' ? 'right' : 'left', padding: '8pt', border: '0.5pt solid #000' }}>{t.selfAssessment}</th>
                                                        <th style={{ width: '60pt', textAlign: 'center', padding: '8pt', border: '0.5pt solid #000' }}>{t.proficient}</th>
                                                        <th style={{ width: '60pt', textAlign: 'center', padding: '8pt', border: '0.5pt solid #000' }}>{t.needPractice}</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {(currentPlan.selfAssessment || []).map((item, idx) => (
                                                        <tr key={idx} className="border-b border-slate-200">
                                                            <td className="p-2 font-medium border" style={{ border: '0.5pt solid #000' }}>{item.criteria}</td>
                                                            <td className="text-center text-slate-300 border" style={{ border: '0.5pt solid #000' }}>⚪</td>
                                                            <td className="text-center text-slate-300 border" style={{ border: '0.5pt solid #000' }}>⚪</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* FOOTER */}
                                        <div className="mt-10 pt-4 border-t border-slate-100 text-center opacity-40 text-[9px]">
                                            {t.footer}
                                        </div>
                                    </div>

                                    {/* ACTION BUTTONS */}
                                    <div className={`fixed bottom-8 ${(currentPlan.docLang || 'ar') === 'ar' ? 'left-8' : 'right-8'} flex flex-col gap-4 no-print z-50`}>
                                        <button 
                                            onClick={exportToWord}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-full shadow-xl hover:scale-110 transition-transform active:scale-95"
                                            title={t.exportWord}
                                        >
                                            📥
                                        </button>
                                        <button 
                                            onClick={() => window.print()}
                                            className="bg-blue-900 hover:bg-blue-950 text-white p-4 rounded-full shadow-xl hover:scale-110 transition-transform active:scale-95"
                                            title={t.print}
                                        >
                                            🖨️
                                        </button>
                                    </div>
                                </>
                            ) : (
                                <div className="h-full min-h-[600px] flex flex-col items-center justify-center border-4 border-dashed border-slate-300 rounded-3xl bg-white text-slate-300 p-10 text-center">
                                    <div className="text-8xl mb-4">📄</div>
                                    <p className="font-bold text-xl text-slate-400">{t.placeholder}</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================
        // RENDER APP
        // ============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
