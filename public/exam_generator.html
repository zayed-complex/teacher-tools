<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولّد الامتحانات الذكي - مجمّع زايد التعليمي</title>
    
    <!-- Scripts & Styles -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans Arabic', 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }
        @media print {
            .no-print { display: none !important; }
            #printable-area { 
                border: none !important; 
                box-shadow: none !important; 
                width: 100% !important; 
                margin: 0 !important; 
                padding: 20px !important; 
            }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ============================================
        // TRANSLATIONS
        // ============================================
        const translations = {
            ar: {
                title: "نظام توليد الامتحانات الذكي",
                setup: "إعداد الامتحان",
                subject: "المادة",
                grade: "الصف",
                topic: "الموضوع",
                objective: "أسئلة موضوعية",
                subjective: "أسئلة مقالية",
                totalGrade: "الدرجة الكلية",
                duration: "المدة (دقيقة)",
                generate: "📝 توليد الامتحان",
                modelsPreview: "اختر النموذج:",
                placeholder: "أدخل بيانات الامتحان ثم اضغط 'توليد'",
                examTitle: "ورقة امتحان رسمية",
                questionOne: "السؤال الأول: اختر الإجابة الصحيحة",
                questionTwo: "السؤال الثاني: أجب عن الأسئلة التالية",
                answerKey: "نموذج الإجابة (للمعلم فقط)",
                finished: "انتهت الأسئلة - بالتوفيق للجميع",
                loading: "⏳ جاري التوليد...",
                error: "يرجى ملء جميع الحقول",
                apiError: "خطأ في التوليد. تأكد من تشغيل الخادم",
                uae: "دولة الإمارات العربية المتحدة",
                ministry: "وزارة التربية والتعليم",
                school: "مجمّع زايد التعليمي",
                hots: "مهارات تفكير عليا 🧠",
                print: "🖨️ طباعة",
                download: "💾 تحميل"
            },
            en: {
                title: "Intelligent Exam Generator System",
                setup: "Exam Setup",
                subject: "Subject",
                grade: "Grade",
                topic: "Topic",
                objective: "Objective Questions",
                subjective: "Subjective Questions",
                totalGrade: "Total Grade",
                duration: "Duration (minutes)",
                generate: "📝 Generate Exam",
                modelsPreview: "Select Model:",
                placeholder: "Fill in exam details and click 'Generate'",
                examTitle: "Official Exam Paper",
                questionOne: "Question 1: Choose the correct answer",
                questionTwo: "Question 2: Answer the following questions",
                answerKey: "Answer Key (Teacher Use Only)",
                finished: "End of Questions - Good Luck",
                loading: "⏳ Generating...",
                error: "Please fill in all fields",
                apiError: "Generation error. Make sure server is running",
                uae: "United Arab Emirates",
                ministry: "Ministry of Education",
                school: "Zayed Educational Complex",
                hots: "Higher Order Thinking 🧠",
                print: "🖨️ Print",
                download: "💾 Download"
            }
        };

        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        function App() {
            // STATE VARIABLES
            const [lang, setLang] = useState('ar');
            const [subject, setSubject] = useState('');
            const [grade, setGrade] = useState('');
            const [topic, setTopic] = useState('');
            const [numObjective, setNumObjective] = useState(5);
            const [numSubjective, setNumSubjective] = useState(3);
            const [totalGrade, setTotalGrade] = useState(20);
            const [duration, setDuration] = useState('60');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [currentExam, setCurrentExam] = useState(null);
            const [selectedModel, setSelectedModel] = useState(0);

            // TRANSLATIONS
            const t = translations[lang];

            // DATA LISTS
            const subjectsList = [
                "الرياضيات", "العلوم", "الفيزياء", "الكيمياء", 
                "الأحياء", "اللغة العربية", "اللغة الإنجليزية", 
                "الدراسات الاجتماعية", "التربية الإسلامية"
            ];

            const gradesList = [
                "الخامس", "السادس", "السابع", "الثامن", 
                "التاسع", "العاشر", "الحادي عشر", "الثاني عشر"
            ];

            // ============================================
            // GENERATE EXAM FUNCTION
            // ============================================
            const generateExam = async () => {
                // VALIDATE INPUT
                if (!subject || !grade || !topic) {
                    setError(t.error);
                    return;
                }

                setLoading(true);
                setError(null);

                try {
                    // CALL BACKEND SERVER
                    const response = await fetch('/api/generate-exam', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({
                            subject: subject,
                            grade: grade,
                            topic: topic,
                            lang: lang,
                            numObjective: parseInt(numObjective),
                            numSubjective: parseInt(numSubjective),
                            totalGrade: parseInt(totalGrade)
                        })
                    });

                    // PARSE RESPONSE
                    const data = await response.json();

                    // CHECK FOR ERRORS
                    if (!response.ok) {
                        throw new Error(data.error || t.apiError);
                    }

                    // SET EXAM DATA
                    setCurrentExam({
                        ...data.data,
                        subject: data.subject,
                        grade: data.grade,
                        totalGrade: data.totalGrade,
                        duration: duration,
                        school: t.school,
                        createdAt: new Date().toISOString()
                    });

                } catch (error) {
                    console.error('Error generating exam:', error);
                    setError(error.message || t.apiError);
                } finally {
                    setLoading(false);
                }
            };

            // ============================================
            // EXPORT TO WORD FUNCTION
            // ============================================
            const exportToWord = () => {
                const content = document.getElementById('printable-area').innerHTML;
                const html = `
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <style>
                            body { font-family: Arial, sans-serif; direction: rtl; }
                            .text-center { text-align: center; }
                            .font-bold { font-weight: bold; }
                        </style>
                    </head>
                    <body>
                        ${content}
                    </body>
                    </html>
                `;
                
                const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `exam_${subject}_${new Date().toISOString().slice(0, 10)}.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // GET CURRENT MODEL DATA
            const currentModelData = currentExam?.models?.[selectedModel];

            // ============================================
            // RENDER
            // ============================================
            return (
                <div className={`min-h-screen p-4 ${lang === 'ar' ? 'text-right' : 'text-left'}`} dir={lang === 'ar' ? 'rtl' : 'ltr'}>
                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
                        
                        {/* ==================== SIDEBAR ==================== */}
                        <div className="lg:col-span-1 space-y-4 no-print">
                            <div className="bg-white p-6 rounded-xl shadow-md border border-slate-200 sticky top-4">
                                {/* HEADER */}
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-blue-900">⚙️ {t.setup}</h2>
                                    <button 
                                        onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')} 
                                        className="bg-blue-100 text-blue-900 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-200 transition"
                                    >
                                        {lang === 'ar' ? 'EN' : 'AR'}
                                    </button>
                                </div>

                                {/* FORM INPUTS */}
                                <div className="space-y-3">
                                    {/* SUBJECT */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">{t.subject}</label>
                                        <select 
                                            value={subject} 
                                            onChange={(e) => setSubject(e.target.value)}
                                            className="w-full p-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                        >
                                            <option value="">{t.subject}...</option>
                                            {subjectsList.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>

                                    {/* GRADE */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">{t.grade}</label>
                                        <select 
                                            value={grade} 
                                            onChange={(e) => setGrade(e.target.value)}
                                            className="w-full p-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                        >
                                            <option value="">{t.grade}...</option>
                                            {gradesList.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                    </div>

                                    {/* TOPIC */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-700">{t.topic}</label>
                                        <input 
                                            type="text" 
                                            value={topic}
                                            onChange={(e) => setTopic(e.target.value)}
                                            placeholder={t.topic}
                                            className="w-full p-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-blue-500"
                                        />
                                    </div>

                                    {/* QUESTIONS COUNT */}
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-xs font-bold text-slate-700">{t.objective}</label>
                                            <input 
                                                type="number" 
                                                min="1"
                                                value={numObjective}
                                                onChange={(e) => setNumObjective(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded-lg text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-700">{t.subjective}</label>
                                            <input 
                                                type="number" 
                                                min="1"
                                                value={numSubjective}
                                                onChange={(e) => setNumSubjective(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded-lg text-sm"
                                            />
                                        </div>
                                    </div>

                                    {/* GRADE & DURATION */}
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-xs font-bold text-slate-700">{t.totalGrade}</label>
                                            <input 
                                                type="number" 
                                                min="1"
                                                value={totalGrade}
                                                onChange={(e) => setTotalGrade(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded-lg text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-700">{t.duration}</label>
                                            <input 
                                                type="number" 
                                                min="1"
                                                value={duration}
                                                onChange={(e) => setDuration(e.target.value)}
                                                className="w-full p-2 border border-slate-300 rounded-lg text-sm"
                                            />
                                        </div>
                                    </div>

                                    {/* GENERATE BUTTON */}
                                    <button 
                                        onClick={generateExam}
                                        disabled={loading}
                                        className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white font-bold py-3 rounded-lg transition mt-4"
                                    >
                                        {loading ? t.loading : t.generate}
                                    </button>
                                </div>

                                {/* ERROR MESSAGE */}
                                {error && (
                                    <div className="mt-4 p-3 bg-red-100 text-red-700 rounded-lg text-xs border border-red-300">
                                        ⚠️ {error}
                                    </div>
                                )}
                            </div>

                            {/* MODEL SELECTOR */}
                            {currentExam && (
                                <div className="bg-white p-4 rounded-xl shadow-md border border-slate-200">
                                    <p className="text-xs font-bold mb-3 text-slate-700">{t.modelsPreview}</p>
                                    <div className="grid grid-cols-4 gap-2">
                                        {currentExam.models?.map((model, i) => (
                                            <button
                                                key={i}
                                                onClick={() => setSelectedModel(i)}
                                                className={`py-2 px-3 rounded font-bold text-sm transition ${
                                                    selectedModel === i 
                                                        ? 'bg-blue-600 text-white shadow-lg' 
                                                        : 'bg-slate-100 hover:bg-slate-200'
                                                }`}
                                            >
                                                {model.modelName}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* ==================== MAIN CONTENT ==================== */}
                        <div className="lg:col-span-3">
                            {currentExam && currentModelData ? (
                                <div 
                                    id="printable-area" 
                                    className="bg-white p-10 shadow-xl rounded-lg w-full max-w-[210mm] mx-auto border-2 border-slate-200"
                                >
                                    {/* EXAM HEADER */}
                                    <div className="flex justify-between items-start border-b-2 border-black pb-4 mb-6">
                                        <div className="text-[9px] font-bold text-center">
                                            <p>{t.uae}</p>
                                            <p>{t.ministry}</p>
                                            <p>{currentExam.school}</p>
                                        </div>
                                        <div className="text-center flex-1">
                                            <h1 className="text-sm font-black underline">{t.examTitle}</h1>
                                            <p className="text-xl font-bold mt-1">Model ({currentModelData.modelName})</p>
                                        </div>
                                        <div className="text-[9px] font-bold text-right">
                                            <p>📚 {currentExam.subject}</p>
                                            <p>📊 {currentExam.grade}</p>
                                            <p>⏱️ {currentExam.duration} min</p>
                                        </div>
                                    </div>

                                    {/* OBJECTIVE QUESTIONS */}
                                    {currentModelData.objectiveQuestions && currentModelData.objectiveQuestions.length > 0 && (
                                        <>
                                            <h3 className="bg-blue-50 p-3 font-bold text-sm mb-4 border-r-4 border-blue-600">
                                                {t.questionOne}
                                            </h3>
                                            {currentModelData.objectiveQuestions.map((q, i) => (
                                                <div key={i} className="mb-4">
                                                    <p className="font-bold text-sm">{i + 1}. {q.q}</p>
                                                    <div className="grid grid-cols-2 gap-3 text-sm px-4 mt-2">
                                                        {q.options?.map((opt, idx) => (
                                                            <div key={idx}>
                                                                <span className="font-bold">{['أ', 'ب', 'ج', 'د'][idx]})</span> {opt}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </>
                                    )}

                                    {/* SUBJECTIVE QUESTIONS */}
                                    {currentModelData.subjectiveQuestions && currentModelData.subjectiveQuestions.length > 0 && (
                                        <>
                                            <h3 className="bg-blue-50 p-3 font-bold text-sm mb-4 border-r-4 border-blue-600 mt-8">
                                                {t.questionTwo}
                                            </h3>
                                            {currentModelData.subjectiveQuestions.map((q, i) => (
                                                <div key={i} className="mb-6">
                                                    <p className="font-bold text-sm">
                                                        {i + 1}. {q.q} {q.isHOTS && `[${t.hots}]`}
                                                    </p>
                                                    {[...Array(q.linesNeeded || 3)].map((_, l) => (
                                                        <div key={l} className="border-b border-dotted border-slate-400 h-8"></div>
                                                    ))}
                                                    <p className="text-xs text-slate-600 mt-1">({q.points || 5} points)</p>
                                                </div>
                                            ))}
                                        </>
                                    )}

                                    {/* FINISHED MESSAGE */}
                                    <p className="text-center text-sm font-bold mt-8 text-blue-900">
                                        {t.finished}
                                    </p>

                                    {/* ANSWER KEY (Not Printed) */}
                                    <div className="mt-10 pt-10 border-t-2 border-dashed border-slate-300 no-print">
                                        <h2 className="text-center font-bold text-blue-900 mb-4">
                                            {t.answerKey} ({currentModelData.modelName})
                                        </h2>
                                        
                                        {currentModelData.objectiveQuestions && (
                                            <div className="mb-4">
                                                <p className="font-bold text-sm mb-2">Objective Answers:</p>
                                                <div className="text-xs bg-slate-50 p-3 rounded border border-slate-200">
                                                    {currentModelData.objectiveQuestions.map((q, i) => (
                                                        <div key={i} className="mb-1">
                                                            Q{i + 1}: <span className="font-bold">{q.correctAnswer}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {currentModelData.subjectiveQuestions && (
                                            <div>
                                                <p className="font-bold text-sm mb-2">Subjective Answers:</p>
                                                <div className="text-xs bg-slate-50 p-3 rounded border border-slate-200">
                                                    {currentModelData.subjectiveQuestions.map((q, i) => (
                                                        <div key={i} className="mb-3">
                                                            <p className="font-bold">Q{i + 1}: {q.q}</p>
                                                            <p className="text-slate-700">{q.modelAnswer}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="h-96 flex items-center justify-center border-4 border-dashed border-slate-300 rounded-lg bg-white">
                                    <p className="text-center text-slate-500 font-bold px-4">{t.placeholder}</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ==================== ACTION BUTTONS ==================== */}
                    {currentExam && (
                        <div className="fixed bottom-8 right-8 flex flex-col gap-4 no-print z-50">
                            <button 
                                onClick={() => window.print()}
                                className="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full shadow-lg transition hover:scale-110"
                                title={t.print}
                            >
                                🖨️
                            </button>
                            <button 
                                onClick={exportToWord}
                                className="bg-green-600 hover:bg-green-700 text-white p-4 rounded-full shadow-lg transition hover:scale-110"
                                title={t.download}
                            >
                                💾
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // ============================================
        // RENDER APP
        // ============================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
